<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contenedores — Cortas y largas (flashcards)</title>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--mut:#555;--line:#e2e2e2;--card:#f7f7f8;--green:#1d8a4e;--red:#c0392b;--blue:#2563c9;--amber:#b9770e;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e1e;--fg:#ededed;--mut:#b0b0b0;--line:#3a3a3a;--card:#272727;--green:#46c98b;--red:#ff7a6b;--blue:#6ea8ff;--amber:#e0a830;}}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5;max-width:780px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-size:1.4rem;margin:0 0 2px;} .sub{color:var(--mut);margin:0 0 14px;font-size:.93rem;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:5px 12px;cursor:pointer;font:inherit;font-size:.86rem;}
  .chip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);font-weight:600;}
  .stage{perspective:1400px;margin:10px 0;}
  .cardc{position:relative;width:100%;min-height:340px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s;}
  .cardc.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:16px;background:var(--card);padding:26px 24px 34px;display:flex;flex-direction:column;justify-content:center;overflow:auto;}
  .face.back{transform:rotateY(180deg);border-color:var(--green);justify-content:flex-start;}
  .qtxt{font-size:1.1rem;font-weight:600;text-align:center;}
  .atxt{font-size:.95rem;line-height:1.55;}
  .atxt ul{margin:6px 0 2px;padding-left:18px;} .atxt li{margin:3px 0;}
  .atxt code{background:var(--bg);border:1px solid var(--line);padding:1px 5px;border-radius:5px;font-size:.86em;}
  .atxt pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 11px;overflow:auto;font-size:.78rem;line-height:1.4;white-space:pre;}
  .tagl{position:absolute;top:12px;left:16px;font-size:.74rem;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:.74rem;color:var(--mut);}
  .nav{display:flex;gap:8px;justify-content:center;align-items:center;margin:14px 0 4px;flex-wrap:wrap;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:10px;padding:9px 16px;cursor:pointer;font:inherit;font-weight:600;}
  .btn:hover{border-color:var(--blue);}
  .btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);}
  .cnt{color:var(--mut);font-size:.9rem;min-width:90px;text-align:center;}
  .btn.hard{border-color:var(--amber);} .btn.hard.on{background:color-mix(in srgb,var(--amber) 20%,transparent);}
  kbd{border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.8em;background:var(--card);}
</style>
</head>
<body>
<h1>Contenedores — Cortas y largas · Flashcards</h1>
<p class="sub">Recuerdo activo: lee la pregunta, respóndela en voz alta y voltea (click o <kbd>espacio</kbd>). <kbd>←</kbd>/<kbd>→</kbd> para navegar. «Difícil» crea tu pila de repaso. ¿Prefieres leer? <a href="cortas_largas_estudio.html">versión para estudiar</a>.</p>
<div class="filters" id="filters"></div>
<div class="stage">
  <div class="cardc" id="card">
    <div class="face front"><span class="tagl" id="tagf"></span><div class="qtxt" id="q"></div><div class="hint">click / espacio para ver la respuesta</div></div>
    <div class="face back"><span class="tagl" id="tagb"></span><div class="atxt" id="a"></div></div>
  </div>
</div>
<div class="nav">
  <button class="btn" id="prev">← Anterior</button>
  <span class="cnt" id="cnt"></span>
  <button class="btn" id="next">Siguiente →</button>
</div>
<div class="nav">
  <button class="btn pri" id="shuffle">🔀 Barajar</button>
  <button class="btn hard" id="hard">⭐ Difícil</button>
  <button class="btn" id="onlyhard">Solo difíciles</button>
</div>

<script src="_banco_cortas_largas.js"></script>
<script>
const CARDS = window.BANCO.map((x,i)=>({
  ...x, i,
  cat: x.tipo==="corta" ? "Cortas" : "Largas"
}));
const CATS = ["Cortas","Largas"];
let active = new Set(CATS), pool = [], idx = 0, onlyHard = false;
const hardSet = new Set(JSON.parse(localStorage.getItem('cl_hard_Contenedores')||'[]'));
const $ = id => document.getElementById(id);
function rebuild(){
  pool = CARDS.filter(c=>active.has(c.cat)&&(!onlyHard||hardSet.has(c.i)));
  if(idx>=pool.length) idx=0;
  render();
}
function render(){
  const f=$('filters'); f.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(active.has(cat)?' on':'');
    b.textContent=cat+' ('+CARDS.filter(c=>c.cat===cat).length+')';
    b.onclick=()=>{active.has(cat)&&active.size>1?active.delete(cat):active.add(cat);idx=0;rebuild();};
    f.appendChild(b);
  });
  const card=$('card'); card.classList.remove('flip');
  if(!pool.length){$('q').textContent='(no hay tarjetas en este filtro)';$('a').textContent='';$('cnt').textContent='0 / 0';return;}
  const c=pool[idx];
  setTimeout(()=>{
    $('q').innerHTML=c.q; $('a').innerHTML=c.a;
    $('tagf').textContent=c.cat+' · Tema '+c.tema; $('tagb').textContent=$('tagf').textContent;
  },60);
  $('cnt').textContent=(idx+1)+' / '+pool.length;
  $('hard').classList.toggle('on',hardSet.has(c.i));
}
function move(d){ if(!pool.length)return; idx=(idx+d+pool.length)%pool.length; render(); }
$('card').onclick=()=>$('card').classList.toggle('flip');
$('prev').onclick=()=>move(-1); $('next').onclick=()=>move(1);
$('shuffle').onclick=()=>{for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}idx=0;render();};
$('hard').onclick=()=>{if(!pool.length)return;const c=pool[idx];hardSet.has(c.i)?hardSet.delete(c.i):hardSet.add(c.i);localStorage.setItem('cl_hard_Contenedores',JSON.stringify([...hardSet]));render();};
$('onlyhard').onclick=e=>{onlyHard=!onlyHard;e.target.classList.toggle('pri');idx=0;rebuild();};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();$('card').classList.toggle('flip');}
  if(e.key==='ArrowRight')move(1); if(e.key==='ArrowLeft')move(-1);
});
rebuild();
</script>
</body>
</html>
