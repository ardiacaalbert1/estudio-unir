<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contenedores — Preguntas y respuestas</title>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--mut:#555;--line:#e2e2e2;--card:#f7f7f8;--green:#1d8a4e;--red:#c0392b;--blue:#2563c9;--amber:#b9770e;--purp:#7c3aed;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e1e;--fg:#ededed;--mut:#b0b0b0;--line:#3a3a3a;--card:#272727;--green:#46c98b;--red:#ff7a6b;--blue:#6ea8ff;--amber:#e0a830;--purp:#b794f6;}}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.55;max-width:860px;margin:0 auto;padding:24px 20px 80px;}
  h1{font-size:1.5rem;margin:0 0 2px;} .sub{color:var(--mut);margin:0 0 14px;font-size:.95rem;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:5px 12px;cursor:pointer;font:inherit;font-size:.86rem;}
  .chip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);font-weight:600;}
  .tools{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:10px;padding:8px 14px;cursor:pointer;font:inherit;font-weight:600;}
  .btn:hover{border-color:var(--blue);}
  .bar{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);padding:8px 0;margin:0 0 8px;font-weight:600;font-size:.9rem;z-index:5;color:var(--mut);}
  .q{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin:12px 0;border-left:4px solid var(--line);}
  .q.corta{border-left-color:var(--blue);}
  .q.larga{border-left-color:var(--amber);}
  .q.concepto{border-left-color:var(--green);}
  .q.test{border-left-color:var(--red);}
  .q.relacionar{border-left-color:var(--purp);}
  .tag{font-size:.75rem;color:var(--mut);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .qh{font-weight:600;margin:5px 0 0;cursor:pointer;display:flex;gap:8px;align-items:baseline;}
  .qh .arrow{color:var(--mut);font-size:.8rem;transition:transform .15s;flex:none;}
  .q.open .arrow{transform:rotate(90deg);}
  .a{display:none;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);font-size:.95rem;}
  .q.open .a{display:block;}
  .a ul{margin:6px 0 2px;padding-left:18px;} .a li{margin:3px 0;}
  code{background:var(--bg);border:1px solid var(--line);padding:1px 5px;border-radius:5px;font-size:.86em;}
  pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px;overflow:auto;font-size:.82rem;line-height:1.4;white-space:pre;}
</style>
</head>
<body>
<h1>Contenedores — Preguntas y respuestas</h1>
<div class="filters" id="grupoFilters"></div>
<div class="filters" id="temaFilters"></div>
<div class="tools">
  <button class="btn" id="expand">▼ Desplegar todas</button>
  <button class="btn" id="collapse">▲ Plegar todas</button>
</div>
<div class="bar" id="bar"></div>
<div id="list"></div>

<script src="_banco_cortas_largas.js"></script>
<script>
/* Contenido de las flashcards (mismo banco que flashcards.html), integrado aquí como pregunta→respuesta. */

/* --- Grupos: unifica cortas/largas (BANCO) con las flashcards (CARDS) --- */
const GRUPOS = [
  {key:"corta",     lab:"Cortas",     cls:"corta"},
  {key:"larga",     lab:"Largas",     cls:"larga"},
];
const CLS = Object.fromEntries(GRUPOS.map(g=>[g.key,g.cls]));
const LAB = Object.fromEntries(GRUPOS.map(g=>[g.key,g.lab]));

/* Normaliza todo a {grupo, tema, q, a}. tema "" (p.ej. «qué NO entra») -> 0 = «General». */
const ITEMS = [
  ...(window.BANCO||[]).map(x=>({grupo:x.tipo, tema:x.tema, q:x.q, a:x.a})),
];

const TEMAS = [...new Set(ITEMS.map(x=>x.tema))].sort((a,b)=>a-b);
let fGrupo = new Set(GRUPOS.map(g=>g.key));  // grupos activos
let fTema  = new Set(TEMAS);                 // temas activos
const $ = id => document.getElementById(id);

function chip(label,on,onclick){
  const b=document.createElement('button');
  b.className='chip'+(on?' on':''); b.textContent=label; b.onclick=onclick;
  return b;
}
function buildFilters(){
  const gf=$('grupoFilters'); gf.innerHTML='';
  GRUPOS.forEach(g=>{
    const n=ITEMS.filter(x=>x.grupo===g.key).length;
    gf.appendChild(chip(g.lab+' ('+n+')', fGrupo.has(g.key), ()=>{
      fGrupo.has(g.key)&&fGrupo.size>1 ? fGrupo.delete(g.key) : fGrupo.add(g.key); render();
    }));
  });
  gf.appendChild(chip('Todos los grupos', fGrupo.size===GRUPOS.length, ()=>{fGrupo=new Set(GRUPOS.map(g=>g.key));render();}));

  const mf=$('temaFilters'); mf.innerHTML='';
  TEMAS.forEach(t=>{
    mf.appendChild(chip(t===0?'General':'Tema '+t, fTema.has(t), ()=>{
      fTema.has(t)&&fTema.size>1 ? fTema.delete(t) : fTema.add(t); render();
    }));
  });
  mf.appendChild(chip('Todos los temas', fTema.size===TEMAS.length, ()=>{fTema=new Set(TEMAS);render();}));
}
function visible(){
  return ITEMS.filter(x=>fGrupo.has(x.grupo)&&fTema.has(x.tema));
}
/* Convierte respuestas escritas como enumeración plana ("a · b · c") en una lista
   de bullets. Deja intactas las que ya traen bloques (ul/ol/li/pre/p/div). */
function fmt(html){
  const s=(html||'').trim();
  if(/<(ul|ol|li|pre|p|div)\b/i.test(s)) return s;   // ya estructurada
  if(s.indexOf(' · ')===-1) return s;                // no es enumeración
  const items=s.split(' · ').map(t=>t.trim()).filter(Boolean)
    .map(t=>'<li>'+t.replace(/\.$/,'')+'</li>').join('');
  return '<ul>'+items+'</ul>';
}
function render(){
  buildFilters();
  const items=visible();
  const cont = c => items.filter(x=>x.grupo===c).length;
  $('bar').textContent = items.length+' preguntas · '+
    cont("corta")+' cortas · '+cont("larga")+' largas · ';
  const l=$('list'); l.innerHTML='';
  items.forEach(x=>{
    const d=document.createElement('div');
    d.className='q '+(CLS[x.grupo]||'');
    d.innerHTML='<span class="tag">'+(LAB[x.grupo]||x.grupo)+' · '+(x.tema===0?'General':'Tema '+x.tema)+'</span>'+
      '<div class="qh"><span class="arrow">▶</span><span>'+x.q+'</span></div>'+
      '<div class="a">'+fmt(x.a)+'</div>';
    d.querySelector('.qh').onclick=()=>d.classList.toggle('open');
    l.appendChild(d);
  });
}
$('expand').onclick=()=>document.querySelectorAll('.q').forEach(q=>q.classList.add('open'));
$('collapse').onclick=()=>document.querySelectorAll('.q').forEach(q=>q.classList.remove('open'));
render();
</script>
</body>
</html>
