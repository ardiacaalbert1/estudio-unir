<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contenedores — Flashcards</title>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--mut:#555;--line:#e2e2e2;--card:#f7f7f8;--green:#1d8a4e;--red:#c0392b;--blue:#2563c9;--amber:#b9770e;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e1e;--fg:#ededed;--mut:#b0b0b0;--line:#3a3a3a;--card:#272727;--green:#46c98b;--red:#ff7a6b;--blue:#6ea8ff;--amber:#e0a830;}}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5;max-width:760px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-size:1.4rem;margin:0 0 2px;} .sub{color:var(--mut);margin:0 0 14px;font-size:.93rem;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:5px 12px;cursor:pointer;font:inherit;font-size:.86rem;}
  .chip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);font-weight:600;}
  .stage{perspective:1200px;margin:8px 0;}
  .cardc{position:relative;width:100%;min-height:250px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s;}
  .cardc.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:16px;background:var(--card);padding:26px 24px;display:flex;flex-direction:column;justify-content:center;overflow:auto;}
  .face.back{transform:rotateY(180deg);border-color:var(--green);}
  .qtxt{font-size:1.08rem;font-weight:600;text-align:center;}
  .atxt{font-size:.98rem;}
  .tagl{position:absolute;top:12px;left:16px;font-size:.75rem;color:var(--mut);font-weight:600;}
  .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:.75rem;color:var(--mut);}
  .nav{display:flex;gap:8px;justify-content:center;align-items:center;margin:14px 0 4px;flex-wrap:wrap;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:10px;padding:9px 16px;cursor:pointer;font:inherit;font-weight:600;}
  .btn:hover{border-color:var(--blue);}
  .btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);}
  .cnt{color:var(--mut);font-size:.9rem;min-width:90px;text-align:center;}
  .btn.hard{border-color:var(--amber);} .btn.hard.on{background:color-mix(in srgb,var(--amber) 20%,transparent);}
  kbd{border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.8em;background:var(--card);}
</style>
</head>
<body>
<h1>Contenedores — Flashcards</h1>
<p class="sub">Recuerdo activo: lee la pregunta, responde en voz alta o mentalmente y voltea (click o <kbd>espacio</kbd>). <kbd>←</kbd>/<kbd>→</kbd> para navegar. «Difícil» crea tu pila de repaso.</p>
<div class="filters" id="filters"></div>
<div class="stage">
  <div class="cardc" id="card">
    <div class="face front"><span class="tagl" id="tagf"></span><div class="qtxt" id="q"></div><div class="hint">click / espacio para ver la respuesta</div></div>
    <div class="face back"><span class="tagl" id="tagb"></span><div class="atxt" id="a"></div></div>
  </div>
</div>
<div class="nav">
  <button class="btn" id="prev">← Anterior</button>
  <span class="cnt" id="cnt"></span>
  <button class="btn" id="next">Siguiente →</button>
</div>
<div class="nav">
  <button class="btn pri" id="shuffle">🔀 Barajar</button>
  <button class="btn hard" id="hard">⭐ Difícil</button>
  <button class="btn" id="onlyhard">Solo difíciles</button>
</div>
<script>
const CARDS = [{"cat": "Conceptos", "q": "¿Para qué sirven los registros de Docker? ¿Qué es Docker Hub?", "a": "Almacenar y distribuir imágenes. Docker Hub es el registro público de imágenes de Docker.", "tema": 1}, {"cat": "Conceptos", "q": "Tecnologías del kernel que usa Docker", "a": "namespaces = aislamiento (cada contenedor su vista del sistema) · cgroups = límite/control de recursos · unionfs = filesystem por capas · libcontainer = runtime nativo.", "tema": 1}, {"cat": "Conceptos", "q": "Imagen vs contenedor", "a": "La imagen es la plantilla inmutable por capas; el contenedor es una instancia en ejecución de la imagen con su capa de escritura (copy-on-write).", "tema": 1}, {"cat": "Conceptos", "q": "¿Cómo guardas el estado actual de un contenedor como imagen?", "a": "docker commit (crea una imagen desde el contenedor).", "tema": 2}, {"cat": "Conceptos", "q": "docker export/import vs docker save/load", "a": "export/import: filesystem de un CONTENEDOR ↔ TAR (pierde capas/metadatos). save/load: IMAGEN completa con sus capas ↔ TAR.", "tema": 4}, {"cat": "Conceptos", "q": "¿Cómo copias ficheros entre host y contenedor?", "a": "docker cp &lt;origen&gt; &lt;destino&gt; (funciona en ambos sentidos; en K8s, kubectl cp).", "tema": 3}, {"cat": "Conceptos", "q": "Instrucciones clave de un Dockerfile", "a": "FROM (imagen base) · RUN (ejecuta al construir) · COPY/ADD (añade ficheros) · WORKDIR · EXPOSE · CMD (comando por defecto, sobrescribible) · ENTRYPOINT (comando fijo).", "tema": 2}, {"cat": "Conceptos", "q": "Tipos de almacenamiento en Docker", "a": "Volumes: gestionados por Docker, persistentes y portables. Bind mounts: cualquier ruta del host, el host puede modificarlos. Tmpfs: en RAM, no persiste.", "tema": 3}, {"cat": "Conceptos", "q": "Redes de Docker", "a": "Bridge: privada interna por defecto (un host) · Host: usa la red del host sin aislamiento · Overlay: conecta varios hosts (Swarm) · None: sin red.", "tema": 3}, {"cat": "Conceptos", "q": "¿Qué es Docker Compose?", "a": "Definir y arrancar aplicaciones multi-contenedor con un docker-compose.yml (services, networks, volumes) y docker compose up.", "tema": 4}, {"cat": "Conceptos", "q": "Docker Swarm: nodos y servicios", "a": "Nodos manager (raft, deciden) y worker (ejecutan). Servicios replicados (N réplicas) o globales (uno por nodo). Configs y Secrets para configuración; Stacks para desplegar compose en el clúster. docker node drain vacía un nodo.", "tema": 5}, {"cat": "Conceptos", "q": "Componentes del Control Plane de Kubernetes", "a": "API server (punto de entrada), etcd (almacén clave-valor del estado), Scheduler (asigna Pods a nodos), Controller Manager. En cada nodo: kubelet y kube-proxy.", "tema": 6}, {"cat": "Conceptos", "q": "¿Qué es un Pod?", "a": "La unidad mínima desplegable: uno o más contenedores que comparten IP, red y almacenamiento.", "tema": 7}, {"cat": "Conceptos", "q": "Labels vs Annotations", "a": "Labels: pares clave-valor identificativos, usados por los selectores para agrupar/seleccionar. Annotations: metadatos NO identificativos.", "tema": 7}, {"cat": "Conceptos", "q": "Probes de un Pod", "a": "livenessProbe: ¿sigue vivo? (si falla, se reinicia) · readinessProbe: ¿listo para recibir tráfico? Métodos: exec (comando), httpGet, tcpSocket.", "tema": 7}, {"cat": "Conceptos", "q": "requests vs limits", "a": "resources.requests: mínimo garantizado (lo usa el scheduler para planificar) · resources.limits: tope máximo que puede consumir.", "tema": 7}, {"cat": "Conceptos", "q": "Tipos de Service en Kubernetes", "a": "ClusterIP: IP interna (solo dentro del clúster) · NodePort: mismo puerto en la IP de cada nodo · LoadBalancer: balanceador externo del cloud · ExternalName: alias DNS (CNAME).", "tema": 8}, {"cat": "Conceptos", "q": "ReplicaSet, DaemonSet, Ingress", "a": "ReplicaSet: mantiene N réplicas (si cae un nodo, replanifica los Pods en otros). DaemonSet: un Pod por nodo. Ingress: enrutamiento HTTP/L7 externo hacia varios servicios.", "tema": 8}, {"cat": "Conceptos", "q": "Deployment vs StatefulSet", "a": "Deployment: apps sin estado, rolling update y rollback. StatefulSet: apps con estado — réplicas con hostname/identidad únicos, creación y destrucción ordenadas, almacenamiento estable.", "tema": 10}, {"cat": "Conceptos", "q": "Jobs y CronJobs (posible pregunta corta)", "a": "Job: ejecuta Pods hasta completar la tarea (spec.completions, spec.backoffLimit, spec.activeDeadlineSeconds como tiempo límite). CronJob: Jobs programados periódicamente con spec.schedule en sintaxis cron (ej. \"0 3 * * *\").", "tema": 10}, {"cat": "Conceptos", "q": "Volúmenes en Kubernetes", "a": "emptyDir: efímero, se borra con el Pod · hostPath: ruta del nodo · PV/PVC: el PersistentVolume desacopla el almacenamiento; el Pod lo reclama vía PersistentVolumeClaim · StorageClass: aprovisionamiento dinámico.", "tema": 9}, {"cat": "Conceptos", "q": "ConfigMaps y Secrets (ojo curso)", "a": "Inyectan configuración como variables de entorno o volúmenes. OJO: el curso da por FALSA la afirmación «el volumen montado de un ConfigMap se actualiza automáticamente» (T9·P3).", "tema": 9}, {"cat": "Conceptos", "q": "Comandos de rollout", "a": "kubectl rollout status (estado) · undo (revertir) · pause (pausar) · kubectl scale (cambiar réplicas).", "tema": 10}, {"cat": "Conceptos", "q": "kubectl esenciales", "a": "kubectl get/describe · exec (comando dentro) · logs · cp (copiar ficheros) · port-forward (puerto local → Pod) · apply -f (manifiesto YAML).", "tema": 7}, {"cat": "Conceptos", "q": "¿Qué NO entra en el examen?", "a": "Helm, Grafana/Prometheus, certificados, GitOps y mallas de servicio (mesh), Kafka/Kinesis. Swarm sí puede caer en teoría. Solo comandos que aparecen en los PDFs.", "tema": ""}, {"cat": "Banco test", "q": "Los registros de Docker sirven para:", "a": "Almacenar y distribuir imágenes de Docker.", "tema": 1}, {"cat": "Banco test", "q": "¿Qué es Docker Hub?:", "a": "Un registro público de imágenes Docker.", "tema": 1}, {"cat": "Banco test", "q": "¿Qué es Docker Desktop?:", "a": "Aplicación para instalar Docker en Windows y Mac OS.", "tema": 1}, {"cat": "Banco test", "q": "Los contenedores de Docker:", "a": "Permiten aprovechar mejor el hardware de la máquina host.", "tema": 1}, {"cat": "Banco test", "q": "Los espacios de nombres (o namespaces):", "a": "Proporcionan capas de aislamiento a los contenedores.", "tema": 1}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: namespaces?", "a": "Aislamiento: cada contenedor tiene su propia vista de los recursos del sistema.", "tema": 1}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: libcontainer?", "a": "Runtime nativo que crea contenedores hablando directamente con el kernel.", "tema": 1}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: cgroups?", "a": "Limitan y controlan los recursos (CPU, memoria) de cada contenedor.", "tema": 1}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: unionfs?", "a": "Sistema de ficheros en capas (las imágenes se construyen por capas).", "tema": 1}, {"cat": "Banco test", "q": "¿En qué lenguaje de programación está escrito Docker?:", "a": "Go.", "tema": 1}, {"cat": "Banco test", "q": "¿Cómo podemos indicarle a Docker Machine las credenciales de nuestro proveedor de la nube?:", "a": "Todas las anteriores.", "tema": 1}, {"cat": "Banco test", "q": "¿Cómo se comunica el cliente de Docker con el demonio de Docker?:", "a": "Mediante un API REST.", "tema": 1}, {"cat": "Banco test", "q": "Los contenedores de Docker:", "a": "Comparten el kernel o núcleo del sistema operativo host.", "tema": 1}, {"cat": "Banco test", "q": "¿Cómo podemos guardar el estado actual de un contenedor como imagen?:", "a": "Utilizando el comando docker commit", "tema": 2}, {"cat": "Banco test", "q": "¿Qué hace la instrucción COPY package.tar . definida en un fichero Dockerfile al construir la imagen?:", "a": "Copia el fichero package.tar en el directorio de trabajo.", "tema": 2}, {"cat": "Banco test", "q": "¿Qué formato tienen los ficheros Dockerfile?:", "a": "Texto.", "tema": 2}, {"cat": "Banco test", "q": "¿Cómo podemos crear un registro Docker local?:", "a": "Utilizando la imagen pública registry de Docker Hub.", "tema": 2}, {"cat": "Banco test", "q": "El comando docker pull nginx:", "a": "Descarga la imagen nginx etiquetada como latest.", "tema": 2}, {"cat": "Banco test", "q": "¿Qué comando de Docker nos permite generar una imagen?:", "a": "docker build", "tema": 2}, {"cat": "Banco test", "q": "Hemos empaquetado todo el sistema de ficheros de una máquina virtual existente en un fichero TAR y queremos crear una imagen Docker a partir de él. ¿Cuál sería la primera instrucción de nuestro Dockerfile?:", "a": "FROM scratch", "tema": 2}, {"cat": "Banco test", "q": "El comando docker rmi myimage:", "a": "Elimina la imagen del repositorio «myimage» etiquetada como latest.", "tema": 2}, {"cat": "Banco test", "q": "¿Para qué sirve la instrucción ONBUILD en un fichero Dockerfile?:", "a": "Permite añadir a la imagen un comando que se ejecutará más adelante, al usar la imagen generada como base en otra construcción.", "tema": 2}, {"cat": "Banco test", "q": "¿Qué comando de Docker nos permite listar las capas que componen una imagen?:", "a": "docker image history", "tema": 2}, {"cat": "Banco test", "q": "¿Con qué comando podemos copiar ficheros de un contenedor al sistema de ficheros local?:", "a": "docker cp", "tema": 3}, {"cat": "Banco test", "q": "¿En qué estado queda un contenedor cuando finaliza su ejecución?:", "a": "Exited.", "tema": 3}, {"cat": "Banco test", "q": "¿Cuál es el controlador de red por defecto cuando creamos una red?:", "a": "Bridge", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Overlay?", "a": "Conecta varios hosts/demonios Docker entre sí (Swarm).", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Host?", "a": "Usa la pila de red del host directamente, sin aislamiento.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Bridge?", "a": "Red privada interna por defecto dentro de un host.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: None?", "a": "Sin red; el contenedor queda aislado.", "tema": 3}, {"cat": "Banco test", "q": "¿Qué comando nos permite eliminar las redes que no están en uso?:", "a": "docker network prune", "tema": 3}, {"cat": "Banco test", "q": "Si ejecutamos un contenedor de la siguiente manera: Figura 7. Código de la pregunta 6. Fuente: elaboración propia.", "a": "El contenedor B podrá llegar al A por su IP, nombre y alias.", "tema": 3}, {"cat": "Banco test", "q": "¿Cómo conectamos un contenedor en ejecución a una red ya existente?:", "a": "docker network connect miRed miContenedor", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Volumes?", "a": "Gestionados por Docker, persistentes y portables.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Bind mounts (1)?", "a": "Los procesos del anfitrión pueden modificarlos.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Bind mounts (2)?", "a": "Pueden almacenarse en cualquier parte del sistema de ficheros del host.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Tmpfs mounts?", "a": "Viven en memoria RAM; no persisten. (El enunciado duplica la fila Bind mounts: es un fallo del test.)", "tema": 3}, {"cat": "Banco test", "q": "Si ejecutamos un contenedor de la siguiente manera: Figura 8. Código de la pregunta 9. Fuente: elaboración propia.", "a": "Montará el volumen de Docker llamado «mis-datos» en la ruta /datos del contenedor.", "tema": 3}, {"cat": "Banco test", "q": "¿Qué comando podríamos utilizar para obtener información sobre los procesos en ejecución de un contenedor?:", "a": "Todas las anteriores.", "tema": 3}, {"cat": "Banco test", "q": "¿Qué hace el comando docker export?:", "a": "Exporta el sistema de ficheros de un contenedor a un fichero TAR.", "tema": 4}, {"cat": "Banco test", "q": "¿Qué opción de configuración de Compose permite publicar puertos del servicio al host?:", "a": "ports", "tema": 4}, {"cat": "Banco test", "q": "¿Cuál de las siguientes afirmaciones sobre Docker Hub es correcta?:", "a": "Todas las anteriores.", "tema": 4}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: docker export?", "a": "Saca el filesystem de un contenedor a un TAR.", "tema": 4}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: docker import?", "a": "Crea una imagen desde ese TAR.", "tema": 4}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: docker save?", "a": "Guarda una imagen con sus capas a TAR.", "tema": 4}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: docker load?", "a": "Carga una imagen desde un TAR.", "tema": 4}, {"cat": "Banco test", "q": "¿Qué acciones puede realizar el comando docker-compose build?:", "a": "Genera imágenes a partir de ficheros Dockerfile referenciados con build en Compose.", "tema": 4}, {"cat": "Banco test", "q": "¿Qué sección a nivel raíz de Compose nos permite definir volúmenes con nombre para ser referenciados en los servicios?:", "a": "volumes.", "tema": 4}, {"cat": "Banco test", "q": "¿Cuál de las siguientes afirmaciones sobre Portainer es correcta?:", "a": "Todas las anteriores", "tema": 4}, {"cat": "Banco test", "q": "¿Qué hace el comando docker-compose down?:", "a": "Detiene y elimina un servicio, parando y eliminando los recursos asociados.", "tema": 4}, {"cat": "Banco test", "q": "¿Para qué lenguajes de programación Docker ofrece de manera oficial un SDK?:", "a": "Go y Python.", "tema": 4}, {"cat": "Banco test", "q": "¿Qué opciones de configuración de Compose permiten pasar variables de entorno a los servicios?:", "a": "environment y envfile", "tema": 4}, {"cat": "Banco test", "q": "¿Qué nodos pueden ejecutar tareas en el modo Swarm?:", "a": "Todos los nodos del clúster, siempre que no tengan disponibilidad drain.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué ocurre con las tareas en ejecución de un nodo cuando ponemos su disponibilidad a drain?:", "a": "Las tareas en ejecución de servicios replicados se paran y se planifican en otros nodos. Las tareas de servicios globales simplemente se paran.", "tema": 5}, {"cat": "Banco test", "q": "¿Cómo se transmiten entre los nodos de un clúster en modo Swarm los objetos config y secret?:", "a": "Tanto los objetos config como los secret se transmiten encriptados.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué ocurre si definimos opciones de configuración build para un servicio en un fichero docker-compose.yaml y lo desplegamos con el comando docker stack deploy?:", "a": "Mostrará un mensaje avisando que al no estar soportada la configuración build será ignorada, y continuará con el despliegue.", "tema": 5}, {"cat": "Banco test", "q": "¿Cómo podemos convertir un nodo worker de un clúster en modo Swarm a nodo mánager?", "a": "Con el comando docker node promote.", "tema": 5}, {"cat": "Banco test", "q": "¿Cuál de las siguientes afirmaciones no es correcta?:", "a": "Todos los nodos del clúster pueden atender llamadas al API de Swarm.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué comando debemos ejecutar en una maquina con Docker instalado para añadirlo como nodo worker a un clúster de Swarm?:", "a": "El comando los obtendremos al ejecutar docker swarm join-token worker en un nodo mánager.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué comando nos permite desplegar en un clúster en modo swarm un aplicación definida en un fichero docker-compose.yaml?:", "a": "docker stack deploy --compose-file docker-compose.yml", "tema": 5}, {"cat": "Banco test", "q": "¿Cómo podemos añadir un objeto secret a un servicio existente en un clúster en modo swarm?:", "a": "docker service update --secret-add my-secret my-service", "tema": 5}, {"cat": "Banco test", "q": "¿Cuál de las siguientes afirmaciones no es correcta?:", "a": "Un nodo que pertenece a un clúster no puede ejecutar contenedores independientes fuera del clúster.", "tema": 5}, {"cat": "Banco test", "q": "¿Cuál de los siguientes componentes de Kubernetes pertenecen a un nodo máster?:", "a": "Controller Manager.", "tema": 6}, {"cat": "Banco test", "q": "¿Cuál de los siguientes componentes de Kubernetes pertenecen a un nodo worker?:", "a": "Kubelet.", "tema": 6}, {"cat": "Banco test", "q": "¿Cuál de las siguientes afirmaciones no es cierta?:", "a": "Cada Pod ejecutará un único contenedor.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Servicio?", "a": "Expone Pods con IP/nombre estable y balancea la carga.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Pod?", "a": "Unidad mínima: contenedores que comparten red y almacenamiento.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: etcd?", "a": "Almacén clave-valor con el estado del clúster.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Scheduler?", "a": "Asigna Pods a nodos.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: DaemonSets?", "a": "Una copia del Pod en cada nodo.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: StatefulSets?", "a": "Apps con estado: identidad y almacenamiento estables.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Deployments?", "a": "Apps sin estado con rolling update.", "tema": 6}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: CronJobs?", "a": "Jobs programados.", "tema": 6}, {"cat": "Banco test", "q": "¿Qué controlador de Kubernetes está pensado para aplicaciones con estado?:", "a": "StatefulSets", "tema": 6}, {"cat": "Banco test", "q": "¿Qué sistema operativo soporta Minikube?:", "a": "Todos los anteriores.", "tema": 6}, {"cat": "Banco test", "q": "¿Cuál de las siguientes afirmaciones es falsa?:", "a": "Cada Pod ejecutará un único contenedor.", "tema": 6}, {"cat": "Banco test", "q": "¿Cuál es la herramienta de línea de comandos de Kubernetes?:", "a": "Kubectl", "tema": 6}, {"cat": "Banco test", "q": "¿Cuál la principal función de un ReplicaSet?:", "a": "Garantizar que nuestra aplicación tiene el numero deseado de Pods.", "tema": 6}, {"cat": "Banco test", "q": "¿Cuál de las siguientes afirmaciones no es cor anco test", "q": "¿Cuál de las siguientes afirmaciones sobre los ConfigMaps es falsa?:", "a": "El volumen montado a partir de un ConfigMap se actualizará automáticamente cuando se hagan cambios en este último.", "tema": 9}, {"cat": "Banco test", "q": "Los volúmenes hostPath:", "a": "Permiten montar en el Pod un directorio o archivo específico del sistema de ficheros del nodo.", "tema": 9}, {"cat": "Banco test", "q": "Los volúmenes emptyDir:", "a": "Se crean inicialmente vacíos, y serán eliminados cuando el Pod finalice su ejecución.", "tema": 9}, {"cat": "Banco test", "q": "Los PersistentVolumes:", "a": "Todas la anteriores.", "tema": 9}, {"cat": "Banco test", "q": "Los PersistentVolumeClaims:", "a": "Todas la anteriores.", "tema": 9}, {"cat": "Banco test", "q": "Las StorageClass:", "a": "Todas la anteriores.", "tema": 9}, {"cat": "Banco test", "q": "Los ConfigMaps:", "a": "Se crean en un determinado Namespace, pudiendo ser utilizado solo por recursos de este.", "tema": 9}, {"cat": "Banco test", "q": "Los objetos Secrets de Kubernetes:", "a": "Se almacenan codificados en base64, pero no cifrados.", "tema": 9}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Deployments?", "a": "Apps sin estado; rolling update y rollback.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: StatefulSets?", "a": "Apps con estado; orden e identidad.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Jobs?", "a": "Tarea que se ejecuta hasta completarse.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: CronJobs?", "a": "Jobs programados periódicamente.", "tema": 10}, {"cat": "Banco test", "q": "Los recursos Job de Kubernetes:", "a": "Soportan políticas de reinicio para la gestión de errores en la ejecución.", "tema": 10}, {"cat": "Banco test", "q": "Los recursos CronJob de Kubernetes:", "a": "Permiten la planificación de los Jobs para su ejecución a una hora concreta o de forma periódica.", "tema": 10}, {"cat": "Banco test", "q": "Los recursos Deployment de Kubernetes:", "a": "Todas las anteriores.", "tema": 10}, {"cat": "Banco test", "q": "Los recursos StatefulSets de Kubernetes:", "a": "Todas las anteriores.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuál de los siguientes objetos de Kubernetes crea un Replicaset para gestionar las réplicas?:", "a": "Deployments.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: kubectl rollout status?", "a": "Estado del despliegue.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: kubectl rollout undo?", "a": "Revierte a la versión anterior.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: kubectl rollout pause?", "a": "Pausa el despliegue.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: kubectl scale?", "a": "Cambia el número de réplicas.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuál de las siguientes propiedades de un manifiesto YAML permiten establecer un tiempo límite de ejecución de un Job en Kubernetes?:", "a": "spec.activeDeadlineSeconds", "tema": 10}, {"cat": "Banco test", "q": "En Kubernetes los objetos Service de tipo headless:", "a": "Todas las anteriores.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuál de los siguientes objetos de Kubernetes permite la ejecución de un Pod periódicamente?:", "a": "CronJobs.", "tema": 10}];
const CATS = [...new Set(CARDS.map(c=>c.cat))];
let active = new Set(CATS), pool = [], idx = 0, onlyHard = false;
const hardSet = new Set(JSON.parse(localStorage.getItem('fc_hard_Contenedores')||'[]'));
const $ = id => document.getElementById(id);
function rebuild(){
  pool = CARDS.map((c,i)=>({...c,i})).filter(c=>active.has(c.cat)&&(!onlyHard||hardSet.has(c.i)));
  if(idx>=pool.length) idx=0;
  render();
}
function render(){
  const f=$('filters'); f.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(active.has(cat)?' on':'');
    b.textContent=cat+' ('+CARDS.filter(c=>c.cat===cat).length+')';
    b.onclick=()=>{active.has(cat)&&active.size>1?active.delete(cat):active.add(cat);rebuild();};
    f.appendChild(b);
  });
  const card=$('card'); card.classList.remove('flip');
  if(!pool.length){$('q').textContent='(no hay tarjetas en este filtro)';$('a').textContent='';$('cnt').textContent='0 / 0';return;}
  const c=pool[idx];
  setTimeout(()=>{ $('q').textContent=c.q; $('a').innerHTML=c.a; $('tagf').textContent=c.cat+(c.tema?' · Tema '+c.tema:''); $('tagb').textContent=$('tagf').textContent; },60);
  $('cnt').textContent=(idx+1)+' / '+pool.length;
  $('hard').classList.toggle('on',hardSet.has(c.i));
}
function move(d){ if(!pool.length)return; idx=(idx+d+pool.length)%pool.length; render(); }
$('card').onclick=()=>$('card').classList.toggle('flip');
$('prev').onclick=()=>move(-1); $('next').onclick=()=>move(1);
$('shuffle').onclick=()=>{for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}idx=0;render();};
$('hard').onclick=()=>{if(!pool.length)return;const c=pool[idx];hardSet.has(c.i)?hardSet.delete(c.i):hardSet.add(c.i);localStorage.setItem('fc_hard_Contenedores',JSON.stringify([...hardSet]));render();};
$('onlyhard').onclick=e=>{onlyHard=!onlyHard;e.target.classList.toggle('pri');idx=0;rebuild();};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();$('card').classList.toggle('flip');}
  if(e.key==='ArrowRight')move(1); if(e.key==='ArrowLeft')move(-1);
});
rebuild();
</script>
