<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CI/CD — Flashcards</title>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--mut:#555;--line:#e2e2e2;--card:#f7f7f8;--green:#1d8a4e;--red:#c0392b;--blue:#2563c9;--amber:#b9770e;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e1e;--fg:#ededed;--mut:#b0b0b0;--line:#3a3a3a;--card:#272727;--green:#46c98b;--red:#ff7a6b;--blue:#6ea8ff;--amber:#e0a830;}}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5;max-width:760px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-size:1.4rem;margin:0 0 2px;} .sub{color:var(--mut);margin:0 0 14px;font-size:.93rem;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:5px 12px;cursor:pointer;font:inherit;font-size:.86rem;}
  .chip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);font-weight:600;}
  .stage{perspective:1200px;margin:8px 0;}
  .cardc{position:relative;width:100%;min-height:250px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s;}
  .cardc.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:16px;background:var(--card);padding:26px 24px;display:flex;flex-direction:column;justify-content:center;overflow:auto;}
  .face.back{transform:rotateY(180deg);border-color:var(--green);}
  .qtxt{font-size:1.08rem;font-weight:600;text-align:center;}
  .atxt{font-size:.98rem;}
  .tagl{position:absolute;top:12px;left:16px;font-size:.75rem;color:var(--mut);font-weight:600;}
  .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:.75rem;color:var(--mut);}
  .nav{display:flex;gap:8px;justify-content:center;align-items:center;margin:14px 0 4px;flex-wrap:wrap;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:10px;padding:9px 16px;cursor:pointer;font:inherit;font-weight:600;}
  .btn:hover{border-color:var(--blue);}
  .btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);}
  .cnt{color:var(--mut);font-size:.9rem;min-width:90px;text-align:center;}
  .btn.hard{border-color:var(--amber);} .btn.hard.on{background:color-mix(in srgb,var(--amber) 20%,transparent);}
  kbd{border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.8em;background:var(--card);}
</style>
</head>
<body>
<h1>CI/CD — Flashcards</h1>
<p class="sub">Recuerdo activo: lee la pregunta, responde en voz alta o mentalmente y voltea (click o <kbd>espacio</kbd>). <kbd>←</kbd>/<kbd>→</kbd> para navegar. «Difícil» crea tu pila de repaso.</p>
<div class="filters" id="filters"></div>
<div class="stage">
  <div class="cardc" id="card">
    <div class="face front"><span class="tagl" id="tagf"></span><div class="qtxt" id="q"></div><div class="hint">click / espacio para ver la respuesta</div></div>
    <div class="face back"><span class="tagl" id="tagb"></span><div class="atxt" id="a"></div></div>
  </div>
</div>
<div class="nav">
  <button class="btn" id="prev">← Anterior</button>
  <span class="cnt" id="cnt"></span>
  <button class="btn" id="next">Siguiente →</button>
</div>
<div class="nav">
  <button class="btn pri" id="shuffle">🔀 Barajar</button>
  <button class="btn hard" id="hard">⭐ Difícil</button>
  <button class="btn" id="onlyhard">Solo difíciles</button>
</div>
<script>
const CARDS = [{"cat": "Conceptos", "q": "¿Cuáles son los tres aspectos de ALM?", "a": "Gobierno, desarrollo y operaciones — intervienen en cada fase del ciclo de vida de la aplicación.", "tema": 1}, {"cat": "Conceptos", "q": "Diferencia entre Integración Continua, Entrega Continua y Despliegue Continuo", "a": "CI: integrar y probar cada cambio automáticamente. Entrega Continua: el producto queda siempre desplegable, el paso a producción es decisión manual. Despliegue Continuo: cada cambio que pasa las pruebas llega a producción automáticamente.", "tema": 1}, {"cat": "Conceptos", "q": "Fases típicas del pipeline de entrega continua", "a": "Source/commit → Build → Test (unitarias → integración → estático) → Release del artefacto (Nexus) → Deploy (dev → staging → prod) → Operate/monitor. Cada fase es una puerta de calidad.", "tema": 4}, {"cat": "Conceptos", "q": "¿Qué se hace en la fase de commit?", "a": "Compilar (build) y ejecutar las pruebas unitarias: feedback rápido a cada cambio.", "tema": 4}, {"cat": "Conceptos", "q": "¿Qué es la pirámide de pruebas?", "a": "Base = unitarias (muchas, rápidas, baratas) · medio = integración/servicio · cima = E2E/UI (pocas, lentas, caras). Invertirla hace el pipeline lento e inestable.", "tema": 5}, {"cat": "Conceptos", "q": "¿Qué son los informes JUnit?", "a": "Ficheros XML con el resultado de la ejecución de las pruebas (no son exclusivos de Java ni de pruebas unitarias); las herramientas de CI los publican.", "tema": 5}, {"cat": "Conceptos", "q": "¿Qué es un Quality Gate de SonarQube?", "a": "Conjunto de condiciones (bugs, cobertura, duplicación, code smells — normalmente sobre código nuevo) que el código debe cumplir; si falla, el pipeline se rompe y el artefacto no se promociona.", "tema": 6}, {"cat": "Conceptos", "q": "Jerarquía de un Jenkinsfile declarativo", "a": "pipeline → stages → stage → steps (con agent, y post { always { … } } para acciones tras el stage).", "tema": 7}, {"cat": "Conceptos", "q": "Arquitectura de Jenkins", "a": "Un master (orquesta, UI, cola) + agentes/nodos que ejecutan los trabajos. El pipeline se define como código en el Jenkinsfile (Groovy), declarativo o scripted.", "tema": 7}, {"cat": "Conceptos", "q": "¿Qué define .gitlab-ci.yml?", "a": "Las stages (orden) y los jobs (script, artifacts, rules) del pipeline; los ejecutan los runners de GitLab (shell, Docker, Kubernetes).", "tema": 8}, {"cat": "Conceptos", "q": "¿Para qué sirve Nexus (o Artifactory)?", "a": "Repositorio de artefactos: almacena y versiona los binarios construidos (JAR, imágenes, paquetes) y hace de proxy de dependencias.", "tema": 9}, {"cat": "Conceptos", "q": "¿Qué es CircleCI? ¿Y Bitbucket?", "a": "CircleCI: CI/CD en la nube con cachés para acelerar builds. Bitbucket: repositorios Git de Atlassian, integrado con Jira/Trello y con Bitbucket Pipelines.", "tema": 9}, {"cat": "Conceptos", "q": "Blue/Green vs Canary", "a": "Blue/Green: dos entornos idénticos, se conmuta el 100% del tráfico de golpe, rollback inmediato, coste doble. Canary: % pequeño y creciente de usuarios con métricas vigiladas, menos coste, despliegue más lento.", "tema": 10}, {"cat": "Conceptos", "q": "Rolling update y Feature flags", "a": "Rolling: se sustituyen los servidores poco a poco, conviven ambas versiones. Feature flag: activar/desactivar funcionalidad por configuración sin desplegar (desacopla desplegar de liberar).", "tema": 10}, {"cat": "Conceptos", "q": "Gitflow: ramas y regla clave", "a": "Ramas de larga duración main + develop, más feature/release/hotfix. Las features se fusionan a develop; cada commit en master se etiqueta con el número de versión.", "tema": 3}, {"cat": "Conceptos", "q": "Flujo centralizado vs feature branching vs GitLab flow vs forking", "a": "Centralizado: una sola rama (trunk). Feature branching: una rama por funcionalidad en el mismo repo (válido en cualquier VCS, no exige PRs). GitLab flow: ramas de feature + ramas de entorno (production/pre-production). Forking: cada dev con su fork y PRs entre forks.", "tema": 3}, {"cat": "Conceptos", "q": "¿Qué conviene versionar en el repositorio?", "a": "Código fuente, scripts, configuración, definición del pipeline… y NO los binarios/artefactos generados (van al repositorio de artefactos).", "tema": 2}, {"cat": "Conceptos", "q": "Conceptos básicos de control de versiones", "a": "Commit: conjunto de cambios registrado en la historia. Rama: línea de desarrollo independiente. Repositorio: almacén de ficheros + historia. Merge: combinar los cambios de dos ramas.", "tema": 2}, {"cat": "Banco test", "q": "¿Cuáles son los tres aspectos de ALM?", "a": "Gobierno, desarrollo y operaciones.", "tema": 1}, {"cat": "Banco test", "q": "¿Qué significa construir, probar y desplegar automáticamente?", "a": "Conseguir que los cambios de código inicien una construcción, ejecuten las pruebas y permitan un despliegue sin intervención humana.", "tema": 1}, {"cat": "Banco test", "q": "¿Por qué es útil desplegar un entorno de producción antes de que acabe el desarrollo?", "a": "Todas las anteriores.", "tema": 1}, {"cat": "Banco test", "q": "¿Qué significa gestionar automáticamente la configuración?", "a": "Mantener la configuración de cada entorno separada del script de despliegue y con un control de versiones.", "tema": 1}, {"cat": "Banco test", "q": "¿Cuál es el objetivo de la integración continua?", "a": "Aumentar la calidad del código detectando los errores lo más pronto posible y la velocidad a la que se entrega a los clientes.", "tema": 1}, {"cat": "Banco test", "q": "¿Cuál es el objetivo de la entrega continua?", "a": "Todas las anteriores.", "tema": 1}, {"cat": "Banco test", "q": "¿Qué diferencia hay entre entrega y despliegue continuos?", "a": "La entrega deja el producto listo para desplegar después de cada cambio, pero no tiene por qué desplegar en producción. El despliegue continuo prosigue el flujo de la entrega múltiples veces al día hasta completar el despliegue en producción.", "tema": 1}, {"cat": "Banco test", "q": "¿Qué se puede esperar de las construcciones de software en una organización que no ha empezado a madurar en la integración continua?", "a": "La construcción es manual y no se gestionan los artefactos.", "tema": 1}, {"cat": "Banco test", "q": "¿En qué debe centrar sus esfuerzos una organización que intenta mejorar su calidad de software?", "a": "En aquellos aspectos del proceso de integración y entrega que sean más dolorosos.", "tema": 1}, {"cat": "Banco test", "q": "¿Cuál de estos elementos es fundamental para empezar a aplicar integración continua?", "a": "Todos los anteriores.", "tema": 1}, {"cat": "Banco test", "q": "¿En qué consiste un commit?", "a": "Es un conjunto de cambios registrados en la historia de un sistema de control de cambios.", "tema": 2}, {"cat": "Banco test", "q": "¿Qué debería ser versionado?", "a": "Todos los anteriores.", "tema": 2}, {"cat": "Banco test", "q": "¿En qué consiste la edición simultánea?", "a": "Varios desarrolladores trabajan sobre el mismo repositorio y probablemente sobre los mismos ficheros y el sistema se encarga de fusionar los cambios de todos automáticamente.", "tema": 2}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Commit?", "a": "Conjunto de cambios registrados en la historia del repositorio.", "tema": 2}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Rama?", "a": "Línea de desarrollo independiente que parte de un punto de la historia.", "tema": 2}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Repositorio?", "a": "Almacén con los ficheros y toda su historia de versiones.", "tema": 2}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Fusión (merge)?", "a": "Combinación de los cambios de dos ramas en una.", "tema": 2}, {"cat": "Banco test", "q": "¿Qué significa «viajar en el tiempo» en el contexto de los sistemas de control de versiones?", "a": "Que un desarrollador puede trabajar en una versión antigua del repositorio.", "tema": 2}, {"cat": "Banco test", "q": "¿Qué metadatos incluyen los commits?", "a": "Todos los anteriores.", "tema": 2}, {"cat": "Banco test", "q": "¿Cómo se recomienda versionar las dependencias de una aplicación?", "a": "Referenciando la versión de la dependencia como una librería e instalándola con un gestor de paquetes durante el despliegue.", "tema": 2}, {"cat": "Banco test", "q": "¿Cómo se crea una nueva rama llamada feature en Git?", "a": "A y B.", "tema": 2}, {"cat": "Banco test", "q": "¿Por qué un sistema de control de versiones distribuido no necesita bloqueo de archivos?", "a": "Porque cada usuario trabaja con una copia completa del repositorio.", "tema": 3}, {"cat": "Banco test", "q": "¿Por qué no se puede aplicar el flujo de GitHub en un sistema de control de versiones centralizado?", "a": "Porque se basa en los conceptos de fork y pull requests, que solo ofrecen los sistemas distribuidos.", "tema": 3}, {"cat": "Banco test", "q": "¿Cuántas ramas soporta el flujo centralizado?", "a": "Solo una, master o trunk.", "tema": 3}, {"cat": "Banco test", "q": "¿Por qué una rama de hotfix se fusiona tanto a master como a develop en el Gitflow?", "a": "Porque el cambio es necesario en producción y debe estar disponible en master, pero; además, hay que incorporarlo en cualquier prueba que se esté realizando en el desarrollo de la siguiente versión. producción.", "tema": 3}, {"cat": "Banco test", "q": "¿Se puede implementar feature branching con GitHub sin usar pull requests?", "a": "Sí, feature branching puede implementarse en cualquier tipo de sistema de control de versiones centralizado o distribuido.", "tema": 3}, {"cat": "Banco test", "q": "¿Cómo se crea un fork en GitHub?", "a": "En la interfaz de GitHub, haciendo clic sobre el botón Fork.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Flujo centralizado?", "a": "Una sola rama principal (trunk/master); todos commitean ahí, sin ramas de feature.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Feature branching?", "a": "Cada funcionalidad en su propia rama dentro del mismo repositorio; se fusiona al acabar.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Flujo de GitLab?", "a": "Ramas de feature + ramas asociadas a entornos (production/pre-production); el despliegue va ligado a ramas.", "tema": 3}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Forking workflow?", "a": "Cada desarrollador tiene su propio fork del repo principal y contribuye vía pull requests entre forks.", "tema": 3}, {"cat": "Banco test", "q": "Un desarrollador no tiene acceso de escritura al repositorio principal repo y ha trabajado en una rama new-feature en su fork. Al abrir la pull request, ¿cuál es la rama de origen y cuál es la de destino?", "a": "El origen es fork/repo:new-feature y el destino es repo:master.", "tema": 3}, {"cat": "Banco test", "q": "¿Qué significa que un repositorio local pueda tener varios repositorios remotos?", "a": "En un sistema distribuido un repositorio puede intercambiar ramas y commits con cualquier otro repositorio. Estos otros repositorios se consideran remotos, y puede definirse más de uno.", "tema": 3}, {"cat": "Banco test", "q": "En Gitflow, ¿por qué se dice que cada fusión sobre master es una nueva versión?", "a": "Porque se añade una etiqueta con el número de la versión a esos commits.", "tema": 3}, {"cat": "Banco test", "q": "¿Cuántas fases de prueba tiene un pipeline de CICD?", "a": "Tantas como sean necesarias en cada proyecto de desarrollo.", "tema": 4}, {"cat": "Banco test", "q": "¿Cuándo debe detenerse un pipeline?", "a": "Todas las anteriores.", "tema": 4}, {"cat": "Banco test", "q": "¿Cuándo no hace falta compilar un software?", "a": "En lenguajes interpretados.", "tema": 4}, {"cat": "Banco test", "q": "¿Por qué es necesario empaquetar un software?", "a": "B y C.", "tema": 4}, {"cat": "Banco test", "q": "¿En qué consiste un smoke test?", "a": "Es una prueba sencilla que permite comprobar si un sistema ha arrancado correctamente, incluyendo todas sus dependencias.", "tema": 4}, {"cat": "Banco test", "q": "¿Por qué hay que construir una única vez?", "a": "Para asegurar que el paquete que ha pasado las pruebas es el mismo que se despliega en producción.", "tema": 4}, {"cat": "Banco test", "q": "¿Qué propiedades deben tener los scripts de despliegue?", "a": "Todas a las anteriores.", "tema": 4}, {"cat": "Banco test", "q": "¿En qué consiste desplegar una copia de producción?", "a": "En desplegar, en un entorno lo más parecido posible a producción, en una fase de prueba para reducir el riesgo del despliegue en producción.", "tema": 4}, {"cat": "Banco test", "q": "¿Por qué un pipeline no sirve para proyectos que funcionan con pull requests?", "a": "Sí que se pueden usar.", "tema": 4}, {"cat": "Banco test", "q": "¿Cómo debería ser una prueba unitaria?", "a": "Todas las anteriores.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué pruebas requieren que la aplicación esté arrancada?", "a": "Todas las anteriores.", "tema": 5}, {"cat": "Banco test", "q": "¿Cuáles de las siguientes se pueden considerar pruebas no funcionales?", "a": "Todas las anteriores.", "tema": 5}, {"cat": "Banco test", "q": "¿Por qué es útil que el desarrollador pueda acceder a los resultados de las pruebas?", "a": "Para poder estudiar el error y ser capaz de corregirlo.", "tema": 5}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Unitarias?", "a": "Rápidas, aisladas, prueban una única función/unidad sin dependencias.", "tema": 5}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: De sistema?", "a": "Prueban el sistema completo integrado (end-to-end), con la app arrancada.", "tema": 5}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: De GUI?", "a": "Prueban la interfaz de usuario, normalmente vía navegador.", "tema": 5}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: De rendimiento?", "a": "Miden tiempos de respuesta/carga bajo demanda (no funcionales).", "tema": 5}, {"cat": "Banco test", "q": "¿Para qué sirve el decorador @pytest.mark.unit?", "a": "Etiqueta la prueba en la batería de pruebas unit.      Estas etiquetas sirven para dividir la ejecución de pruebas en grupos diferentes.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué significa que una prueba de GUI se ejecute en un navegador headless?", "a": "En el navegador no tiene una ventana visible.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué son los informes JUnit?", "a": "Ficheros XML resultado de ejecución de pruebas.", "tema": 5}, {"cat": "Banco test", "q": "¿Cómo se pueden paralelizar las pruebas?", "a": "Todas las anteriores.", "tema": 5}, {"cat": "Banco test", "q": "¿Para qué sirve una fixture?", "a": "Para fijar un estado conocido antes de ejecutar una prueba y devolver el entorno al estado original al terminar.", "tema": 5}, {"cat": "Banco test", "q": "¿Por qué las revisiones de código deberían estar incorporadas en el flujo de integración continua?", "a": "Para que los compañeros del equipo puedan aportar feedback antes de que el código esté fusionado en la rama principal.", "tema": 6}, {"cat": "Banco test", "q": "¿En qué casos es obligatorio que una revisión apruebe una pull request en GitHub para poder fusionarla?", "a": "Cuando se activa la protección de rama.", "tema": 6}, {"cat": "Banco test", "q": "¿Qué tipo de reglas se tienen en cuenta en una convención de estilo?", "a": "Todas las anteriores.", "tema": 6}, {"cat": "Banco test", "q": "¿Por qué los proyectos adoptan convenciones de estilo?", "a": "Todas las anteriores.      En definitiva, para hacer código más fácil de entender.", "tema": 6}, {"cat": "Banco test", "q": "¿Qué mide la cobertura?", "a": "El porcentaje de líneas que se ejecutan durante las pruebas.", "tema": 6}, {"cat": "Banco test", "q": "¿Es una cobertura del 100 % sinónimo de riesgo cero?", "a": "No, porque eso no implica que se hayan probado todas las condiciones y valores de frontera.", "tema": 6}, {"cat": "Banco test", "q": "¿Qué valor aporta Sonar a un proyecto?", "a": "Todas las anteriores.", "tema": 6}, {"cat": "Banco test", "q": "¿Por qué es deseable reducir la complejidad del código?", "a": "La A y la B.", "tema": 6}, {"cat": "Banco test", "q": "¿Qué significa que Sonar utilice un agente?", "a": "Que un proceso se encarga de analizar el código y de enviar los resultados a un servidor central.", "tema": 6}, {"cat": "Banco test", "q": "¿En qué consisten los perfiles de calidad de Sonar?", "a": "En conjuntos de reglas que se evalúan durante el análisis de los proyectos a los que se asigna el perfil.", "tema": 6}, {"cat": "Banco test", "q": "¿Qué trabajos se pueden programar en Jenkins?", "a": "Todas las anteriores.", "tema": 7}, {"cat": "Banco test", "q": "¿Cuál es la contraseña por defecto de Jenkins?", "a": "Es aleatoria, Jenkins la imprime por la salida estándar.", "tema": 7}, {"cat": "Banco test", "q": "¿Dónde debe definirse el código de un pipeline?", "a": "En un Jenkinsfile en el repositorio.", "tema": 7}, {"cat": "Banco test", "q": "¿Sobre qué plataformas puede ejecutar un proyecto Jenkins?", "a": "Sobre cualquier que soporte Java.", "tema": 7}, {"cat": "Banco test", "q": "¿Para qué sirve archivar artefactos?", "a": "Para almacenar el resultado de una compilación, una construcción o de un informe de pruebas, junto a los detalles de la ejecución.", "tema": 7}, {"cat": "Banco test", "q": "¿Cómo se puede configurar un trabajo para que se ejecute cuando hay cambios en un repositorio?", "a": "Todas las anteriores.", "tema": 7}, {"cat": "Banco test", "q": "¿Qué configuración hay que usar para ejecutar un trabajo de Jenkins a cada hora?", "a": "Un trigger periódico y una agenda 0 * * * *.      Esta programación ejecutará el trabajo cada hora en punto.", "tema": 7}, {"cat": "Banco test", "q": "¿Qué relación hay entre «trabajo» y «ejecución» en Jenkins?", "a": "Un trabajo es una definición de una tarea que puede tener varias fases; una ejecución es una activación concreta del trabajo con unos parámetros y un resultado concretos.", "tema": 7}, {"cat": "Banco test", "q": "¿Cómo se indica que debe ser la ejecución de un trabajo en un nodo con herramientas de compilación de Java?", "a": "Asignando una etiqueta concreta a los agentes con herramientas de compilación e indicando esa etiqueta en la sentencia label ''.", "tema": 7}, {"cat": "Banco test", "q": "¿Qué servicios ofrece GitLab?", "a": "Todos los anteriores.", "tema": 8}, {"cat": "Banco test", "q": "¿Cómo se llama la funcionalidad de pull request de GitLab?", "a": "Merge request.", "tema": 8}, {"cat": "Banco test", "q": "¿Dónde se definen las fases de un pipeline en GitLab?", "a": "En el fichero .gitlab-ci.yml, en la raíz del repositorio.", "tema": 8}, {"cat": "Banco test", "q": "¿Dónde se ejecutan los trabajos de un pipeline en GitLab?", "a": "En los runners asociados al proyecto, en los compartidos entre varios proyectos.", "tema": 8}, {"cat": "Banco test", "q": "¿Cómo se determina el orden de ejecución de fases y trabajos?", "a": "Todas las anteriores.", "tema": 8}, {"cat": "Banco test", "q": "¿Para qué sirve la directiva artifacts?", "a": "Todas las anteriores.", "tema": 8}, {"cat": "Banco test", "q": "¿Cuándo se ejecuta un pipeline en GitLab?", "a": "Cuando hay un cambio en una rama, ya sean etiquetas de Git o commits nuevos.", "tema": 8}, {"cat": "Banco test", "q": "¿Cuándo se borran las imágenes del registro de contenedores?", "a": "Tras un intervalo configurable, a menos que estén incluidas como excepción.", "tema": 8}, {"cat": "Banco test", "q": "¿Cuándo se ejecuta el contenido de before_script?", "a": "Antes de iniciar cada trabajo, siempre y cuando el trabajo no sobreescriba la sección beforescript explícitamente.", "tema": 8}, {"cat": "Banco test", "q": "¿Cuándo se detiene un pipeline?", "a": "Todas las anteriores.", "tema": 8}, {"cat": "Banco test", "q": "¿Con qué sistemas de control de versiones distribuidos es compatible Bitbucket?", "a": "Git.", "tema": 9}, {"cat": "Banco test", "q": "¿En qué fichero se definen los pipelines de CircleCI?", "a": ".circleci/config.yml.", "tema": 9}, {"cat": "Banco test", "q": "¿Cómo se ejecutan los trabajos de un workflow de CircleCI?", "a": "En paralelo por defecto, salvo que se definan dependencias entre ellos.", "tema": 9}, {"cat": "Banco test", "q": "¿Se puede seguir un flujo de trabajo de GitHub con Bitbucket?", "a": "Sí, ya que soporta la creación de forks y pull requests.", "tema": 9}, {"cat": "Banco test", "q": "¿Con qué servicios de control de versiones se integra CircleCI?", "a": "GitHub, GitLab y Bitbucket.", "tema": 9}, {"cat": "Banco test", "q": "¿A partir de qué cambios se ejecuta un pipeline de CircleCI?", "a": "Cualquiera de las anteriores.", "tema": 9}, {"cat": "Banco test", "q": "¿En qué consiste un orb de CircleCI?", "a": "Todas las anteriores.", "tema": 9}, {"cat": "Banco test", "q": "¿Qué ventaja tiene usar Nexus como proxy?", "a": "Todas las anteriores.", "tema": 9}, {"cat": "Banco test", "q": "¿Cuándo tiene sentido usar Nexus como repositorio para paquetes o imágenes?", "a": "Cuando los proyectos son privados y no se desea alojarlos en un repositorio público.", "tema": 9}, {"cat": "Banco test", "q": "¿Qué gestores de paquetes soporta Nexus?", "a": "Todas las anteriores.", "tema": 9}, {"cat": "Banco test", "q": "Qué significa que un despliegue no tenga pérdida de servicio?", "a": "Que ofrece todas las funcionalidades durante todo el proceso de despliegue.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Blue/green?", "a": "Dos entornos idénticos; se conmuta todo el tráfico de golpe (todo o nada); rollback inmediato.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Rolling (incremental)?", "a": "Se sustituyen los servidores poco a poco; ambas versiones conviven durante el proceso.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Canary releasing?", "a": "Una porción del tráfico va a la nueva versión para probar con usuarios reales; un fallo solo afecta a esa porción.", "tema": 10}, {"cat": "Relacionar", "q": "¿Qué es / qué hace: Feature flag?", "a": "Activa/desactiva funcionalidades por configuración sin desplegar; desacopla despliegue de exposición.", "tema": 10}, {"cat": "Banco test", "q": "¿Por qué el esquema de datos se puede convertir en un problema si dos versiones conviven en el tiempo?", "a": "Porque el código nuevo puede escribir un dato con un esquema incompatible con el código antiguo.", "tema": 10}, {"cat": "Banco test", "q": "¿Cómo se pueden actualizar sistemas dependientes sin que haya problemas de compatibilidad?", "a": "Todas las anteriores.", "tema": 10}, {"cat": "Banco test", "q": "¿Por qué se ha dicho que el modelo de despliegue blue/green ofrece todo o nada?", "a": "Porque en un momento dado, todos los servidores que dan servicio tienen la misma versión del código.", "tema": 10}, {"cat": "Banco test", "q": "¿Qué ventajas ofrece el Canary releasing frente a un despliegue blue/green?", "a": "A y B son correctas.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuánto tiempo conviven dos versiones en un despliegue incremental?", "a": "Desde que se despliega el primer servidor con la nueva versión hasta que se apaga el último de la versión antigua.", "tema": 10}, {"cat": "Banco test", "q": "¿Qué significa que los despliegues y la oferta de funcionalidades deba desacoplarse?", "a": "Que la fecha de un despliegue no tiene por qué coincidir con la exposición de una nueva funcionalidad a los usuarios.", "tema": 10}, {"cat": "Banco test", "q": "¿Qué usos se le puede dar a una feature flag?", "a": "Todas las anteriores.", "tema": 10}, {"cat": "Banco test", "q": "¿Cómo detecta Kubernetes si un pod ha arrancado correctamente?", "a": "Si hay suficientes ejecuciones exitosas consecutivas de la sonda readinessProbe.", "tema": 10}];
const CATS = [...new Set(CARDS.map(c=>c.cat))];
let active = new Set(CATS), pool = [], idx = 0, onlyHard = false;
const hardSet = new Set(JSON.parse(localStorage.getItem('fc_hard_CI_CD')||'[]'));
const $ = id => document.getElementById(id);
function rebuild(){
  pool = CARDS.map((c,i)=>({...c,i})).filter(c=>active.has(c.cat)&&(!onlyHard||hardSet.has(c.i)));
  if(idx>=pool.length) idx=0;
  render();
}
function render(){
  const f=$('filters'); f.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(active.has(cat)?' on':'');
    b.textContent=cat+' ('+CARDS.filter(c=>c.cat===cat).length+')';
    b.onclick=()=>{active.has(cat)&&active.size>1?active.delete(cat):active.add(cat);rebuild();};
    f.appendChild(b);
  });
  const card=$('card'); card.classList.remove('flip');
  if(!pool.length){$('q').textContent='(no hay tarjetas en este filtro)';$('a').textContent='';$('cnt').textContent='0 / 0';return;}
  const c=pool[idx];
  setTimeout(()=>{ $('q').textContent=c.q; $('a').innerHTML=c.a; $('tagf').textContent=c.cat+(c.tema?' · Tema '+c.tema:''); $('tagb').textContent=$('tagf').textContent; },60);
  $('cnt').textContent=(idx+1)+' / '+pool.length;
  $('hard').classList.toggle('on',hardSet.has(c.i));
}
function move(d){ if(!pool.length)return; idx=(idx+d+pool.length)%pool.length; render(); }
$('card').onclick=()=>$('card').classList.toggle('flip');
$('prev').onclick=()=>move(-1); $('next').onclick=()=>move(1);
$('shuffle').onclick=()=>{for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}idx=0;render();};
$('hard').onclick=()=>{if(!pool.length)return;const c=pool[idx];hardSet.has(c.i)?hardSet.delete(c.i):hardSet.add(c.i);localStorage.setItem('fc_hard_CI_CD',JSON.stringify([...hardSet]));render();};
$('onlyhard').onclick=e=>{onlyHard=!onlyHard;e.target.classList.toggle('pri');idx=0;rebuild();};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();$('card').classList.toggle('flip');}
  if(e.key==='ArrowRight')move(1); if(e.key==='ArrowLeft')move(-1);
});
rebuild();
</script>
