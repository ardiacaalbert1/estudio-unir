<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proyectos — Flashcards (Preguntas cortas)</title>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--mut:#555;--line:#e2e2e2;--card:#f7f7f8;--green:#1d8a4e;--red:#c0392b;--blue:#2563c9;--amber:#b9770e;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e1e;--fg:#ededed;--mut:#b0b0b0;--line:#3a3a3a;--card:#272727;--green:#46c98b;--red:#ff7a6b;--blue:#6ea8ff;--amber:#e0a830;}}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5;max-width:760px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-size:1.4rem;margin:0 0 2px;} .sub{color:var(--mut);margin:0 0 14px;font-size:.93rem;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:5px 12px;cursor:pointer;font:inherit;font-size:.86rem;}
  .chip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);font-weight:600;}
  .stage{perspective:1200px;margin:8px 0;}
  .cardc{position:relative;width:100%;min-height:260px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s;}
  .cardc.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:16px;background:var(--card);padding:26px 24px;display:flex;flex-direction:column;justify-content:center;overflow:auto;}
  .face.back{transform:rotateY(180deg);border-color:var(--green);}
  .qtxt{font-size:1.08rem;font-weight:600;text-align:center;}
  .atxt{font-size:.98rem;}
  .atxt b{color:var(--blue);} .face.back .atxt b{color:inherit;font-weight:700;}
  .tagl{position:absolute;top:12px;left:16px;font-size:.75rem;color:var(--mut);font-weight:600;}
  .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:.75rem;color:var(--mut);}
  .nav{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0 6px;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:10px;padding:8px 16px;cursor:pointer;font:inherit;font-size:.9rem;}
  .btn.pri{border-color:var(--blue);} .btn.pri.on{background:color-mix(in srgb,var(--blue) 18%,transparent);}
  .cnt{color:var(--mut);font-size:.88rem;min-width:66px;text-align:center;}
  .btn.hard{border-color:var(--amber);} .btn.hard.on{background:color-mix(in srgb,var(--amber) 20%,transparent);}
  kbd{border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.8em;background:var(--card);}
</style>
</head>
<body>
<h1>Gestión de Proyectos — Flashcards</h1>
<p class="sub">Las <b>30 preguntas cortas del profe</b> + datos clave y trampas del examen. Lee la pregunta, respóndela en voz alta y voltea (click o <kbd>espacio</kbd>). <kbd>←</kbd>/<kbd>→</kbd> para navegar. «Difícil» crea tu pila de repaso. <b>En el examen caen 4 de las 30.</b></p>
<div class="filters" id="filters"></div>
<div class="stage">
  <div class="cardc" id="card">
    <div class="face front"><span class="tagl" id="tagf"></span><div class="qtxt" id="q"></div><div class="hint">click / espacio para ver la respuesta</div></div>
    <div class="face back"><span class="tagl" id="tagb"></span><div class="atxt" id="a"></div></div>
  </div>
</div>
<div class="nav">
  <button class="btn" id="prev">← Anterior</button>
  <span class="cnt" id="cnt"></span>
  <button class="btn" id="next">Siguiente →</button>
</div>
<div class="nav">
  <button class="btn pri" id="shuffle">🔀 Barajar</button>
  <button class="btn hard" id="hard">⭐ Difícil</button>
  <button class="btn" id="onlyhard">Solo difíciles</button>
</div>
<script>
const CARDS = [
{"cat":"Ágil/Lean","q":"Explica la filosofía Lean y su objetivo.","a":"Nace en la producción de <b>Toyota</b>. Objetivo: entregar el <b>máximo valor al cliente con el mínimo desperdicio</b> (esperas, retrabajo, inventario, sobreproducción) y mejorar el flujo de forma continua.<br><br>Pilares: valor según el <b>cliente</b>, sistemas <b>pull</b>, <b>calidad a la primera</b> y <b>mejora continua (kaizen)</b>. En software: ciclos cortos, decisiones tardías, entrega rápida.","tema":""},
{"cat":"Ágil/Lean","q":"Explica el concepto de MVP y su utilidad.","a":"<b>Producto Mínimo Viable</b>: la versión más sencilla que <b>ya aporta valor</b> y se pone en manos de usuarios reales.<br><br>Sirve para <b>validar hipótesis y aprender del mercado</b> con el mínimo esfuerzo, obtener <b>feedback temprano</b>, reducir el riesgo y decidir con datos, no suposiciones.<br><br>💡 Ej.: lanzar solo catálogo + carrito + un pago, medir si compran y luego ampliar.","tema":""},
{"cat":"Ágil/Lean","q":"Explica qué es una historia de usuario.","a":"Descripción breve de una funcionalidad <b>desde quien la usa</b>. Formato: <b>«Como [rol], quiero [funcionalidad], para [beneficio]»</b>.<br><br>No es especificación cerrada, es una invitación a conversar. Lleva <b>criterios de aceptación</b>. Debe cumplir <b>INVEST</b>: Independiente, Negociable, Valiosa, Estimable, Small (pequeña), Testable.","tema":""},
{"cat":"Ágil/Lean","q":"Explica los valores del Manifiesto Ágil.","a":"Cuatro: <b>individuos e interacciones</b> sobre procesos/herramientas · <b>software funcionando</b> sobre documentación · <b>colaboración con el cliente</b> sobre contrato · <b>respuesta al cambio</b> sobre seguir un plan.<br><br>No niegan lo de la derecha, pero priorizan lo de la izquierda. De ellos derivan los <b>12 principios</b> (se preguntan por separado).","tema":""},
{"cat":"Ágil/Lean","q":"Describe qué es SDLC (Software Development Life Cycle).","a":"<b>«Conjunto de modelos para el desarrollo de software»</b> (definición literal del profe): fases que organizan cómo se desarrolla un sistema.<br><br>Etapas: requisitos → diseño → implementación → pruebas → despliegue → mantenimiento. No hay un único modelo: cascada, incremental, espiral o ágil.","tema":""},
{"cat":"Ágil/Lean","q":"Explica el modelo en cascada (Waterfall) y sus limitaciones frente a lo ágil.","a":"Modelo <b>secuencial</b>: cada fase empieza al terminar la anterior. Funciona con <b>requisitos estables y bien conocidos</b>.<br><br>Limitaciones vs ágil: el cliente ve el resultado <b>muy tarde</b>, los <b>cambios son caros</b>, y los errores del final obligan a rehacer mucho.<br><br>⚠️ La ágil es <b>iterativa</b> (ojo al distractor 'la tradicional es incremental').","tema":""},
{"cat":"Ágil/Lean","q":"¿Qué es un roadmap de producto y para qué sirve?","a":"Representación <b>visual y a alto nivel</b> de la evolución prevista del producto en el tiempo, con sus grandes objetivos y entregas (el profe: <b>«mapa visual claro»</b>).<br><br>Sirve para comunicar la dirección, alinear al equipo y orientar prioridades. No es cerrado: se ajusta con el feedback. Está por encima del backlog y los sprints.","tema":""},

{"cat":"Scrum","q":"¿En qué se basa Scrum? Concepto de aprendizaje empírico.","a":"En el <b>empirismo</b>: el conocimiento surge de la <b>experiencia</b> y se decide sobre lo observado. Tres pilares: <b>transparencia, inspección y adaptación</b>.<br><br>Se entregan <b>incrementos en ciclos cortos (Sprints)</b> y, al inspeccionar, se ajusta producto y proceso. Se aprende haciendo y se reduce el riesgo.","tema":""},
{"cat":"Scrum","q":"Describe qué es un Sprint y cuál es su objetivo.","a":"<b>Iteración de duración fija (1–4 semanas)</b> que produce un <b>incremento terminado y potencialmente entregable</b>. Es el <b>contenedor</b> del resto de eventos (planning, daily, review, retro).<br><br>Objetivo: entregar valor de forma <b>regular y predecible</b> a ritmo sostenible, e inspeccionar/adaptar al final.<br><br>⚠️ El Sprint <b>NO es 'una fase'</b> del proyecto.","tema":""},
{"cat":"Scrum","q":"Explica el concepto de Product Backlog en Scrum.","a":"<b>Lista ordenada y única</b> de todo lo que el producto podría necesitar (funcionalidades, mejoras, correcciones). Responsabilidad del <b>Product Owner</b>, que la prioriza por <b>valor</b>.<br><br>Está <b>viva</b>: se refina y reordena. Lo prioritario, más detallado; lo lejano, más general. De ella salen los elementos de cada Sprint.","tema":""},
{"cat":"Scrum","q":"¿Qué es el Product Backlog? Dibuja (describe) un esquema con ejemplo.","a":"Lista ordenada y única, gestionada por el PO. Se describe con texto de mayor a menor prioridad:<br><br>🔴 <b>Registro y login</b> (alta, detallada)<br>🔴 <b>Carrito de compra</b> (alta)<br>🟡 <b>Pasarela de pago</b> (media)<br>🟢 <b>Recomendaciones</b> (baja, poco detallada)<br><br>Arriba = listo para el sprint; abajo = idea general por refinar.","tema":""},
{"cat":"Scrum","q":"¿Qué es el Sprint Backlog y en qué se diferencia del Product Backlog?","a":"Elementos del Product Backlog <b>seleccionados para el Sprint</b> + el plan + el objetivo. Lo gestionan los <b>desarrolladores</b>.<br><br>Diferencia: el Product Backlog es <b>todo a largo plazo</b>; el Sprint Backlog es <b>solo lo comprometido para el Sprint actual</b> y más detallado.<br><br>⚠️ Quién elige cuántos items entran = los <b>desarrolladores</b>, no el PO.","tema":""},
{"cat":"Scrum","q":"Explica los tres roles (responsabilidades) del marco Scrum.","a":"<b>Product Owner</b>: maximiza el valor; gestiona y prioriza el Product Backlog.<br><b>Scrum Master</b>: facilita el marco, ayuda a autoorganizarse, elimina impedimentos.<br><b>Desarrolladores</b>: construyen el incremento y deciden cómo.<br><br>Equipo pequeño, autogestionado y multifuncional (<b>3–9 personas</b>).<br>⚠️ El SM <b>asegura</b> (no delega) los eventos; nunca es líder técnico único.","tema":""},
{"cat":"Scrum","q":"¿Qué es la Definición de Terminado (Definition of Done)?","a":"<b>Acuerdo del equipo</b> sobre las condiciones para considerar un incremento <b>realmente terminado</b>: probado, revisado, integrado, documentado.<br><br>Garantiza una <b>calidad común</b>, evita ambigüedad y asegura que cada incremento es <b>potencialmente entregable</b>. Es <b>transversal</b> (a diferencia de los criterios de aceptación, que son por historia).","tema":""},
{"cat":"Scrum","q":"¿En qué consiste el Sprint Planning y qué resultados produce?","a":"Reunión que <b>abre el Sprint</b>. Se define el <b>objetivo del Sprint</b>, se <b>seleccionan</b> elementos del Product Backlog y se hace un plan (<b>descomponer historias en tareas</b>).<br><br>Participan PO, SM y desarrolladores. Resultado: <b>Sprint Backlog</b> + objetivo claro.<br><br>⚠️ Test trampa: opciones B y C idénticas → <b>marcar la B</b>.","tema":""},
{"cat":"Scrum","q":"¿Qué es el Daily Scrum y cuál es su propósito?","a":"Reunión breve diaria, <b>máx. 15 minutos</b>, de los <b>desarrolladores</b>. Revisan el avance hacia el objetivo, detectan impedimentos y ajustan el plan del día.<br><br><b>No es un informe a un jefe</b>, es coordinación del propio equipo. Mantiene foco, transparencia y reacción temprana.","tema":""},
{"cat":"Scrum","q":"¿Cuándo y qué se hace en la Retrospectiva? ¿Una o varias?","a":"<b>Al final de cada Sprint</b>, tras la review y antes de planificar el siguiente. Se analiza <b>cómo ha trabajado el equipo</b>: qué fue bien, qué falló, qué mejorar.<br><br>Sirve para inspeccionar/adaptar el <b>PROCESO</b> (no el producto). <b>Hay una por Sprint</b> → varias en el proyecto. Debe salir un <b>compromiso concreto y medible</b>.","tema":""},
{"cat":"Scrum","q":"Explica cómo evaluar una iteración.","a":"Ver si se cumplió el <b>objetivo del Sprint</b> y la <b>Definición de Terminado</b>. Herramientas: <b>Sprint Review</b> (mostrar incremento + feedback del cliente), <b>burndown</b> y tablero.<br><br>Se mide el trabajo completado (<b>velocidad</b>) y la calidad. La <b>retrospectiva</b> evalúa el proceso.<br><br>⚠️ El 'refinamiento' NO es un evento Scrum.","tema":""},
{"cat":"Scrum","q":"Describe el burndown chart.","a":"Gráfico de <b>trabajo pendiente frente al tiempo</b>. Eje <b>Y = trabajo restante</b>; eje X = tiempo.<br><br>La <b>línea ideal</b> baja uniforme hasta cero; la <b>real</b> refleja el avance. Real <b>por encima</b> = retraso; <b>por debajo</b> = adelantado.<br><br>⚠️ No confundir con <b>Burnup</b> = trabajo <b>completado acumulado</b>.","tema":""},
{"cat":"Scrum","q":"Explica el valor ganado en ágil.","a":"Mide el <b>valor realmente entregado</b> según <b>funcionalidades completadas y aceptadas</b>, no el esfuerzo. Solo cuenta lo <b>terminado</b> (cumple la DoD).<br><br>Permite ver el <b>progreso real</b> y compararlo con lo previsto, evitando dar por avanzado trabajo a medias. Más fiable que medir horas.","tema":""},
{"cat":"Scrum","q":"¿Qué es la velocidad (velocity) de un equipo ágil y para qué se usa?","a":"<b>Puntos de historia completados de media por Sprint</b>, calculada con sprints anteriores.<br><br>Se usa para <b>estimar cuánto abarcará</b> el equipo y <b>prever entregas</b>. Es <b>interna y relativa</b>: no sirve para comparar equipos ni como presión.","tema":""},
{"cat":"Scrum","q":"Explica la estimación con puntos de historia y el planning poker.","a":"Los <b>puntos de historia</b> estiman <b>esfuerzo y complejidad relativa</b> (no horas), comparando historias entre sí.<br><br><b>Planning poker</b>: estimación por <b>consenso</b>. Cada uno elige carta en privado, se muestran a la vez y si hay discrepancia se debate y revota. Aprovecha el criterio del equipo y reduce sesgos.","tema":""},

{"cat":"Kanban","q":"Explica cómo funciona Kanban.","a":"<b>Gestión visual</b> del trabajo en un <b>tablero con columnas</b> (estados del proceso). Cada tarea es una <b>tarjeta</b> que avanza de columna en columna.<br><br>Se <b>limita el WIP</b> en cada estado para evitar saturación y ver <b>cuellos de botella</b>. Es <b>flujo continuo</b>, <b>sin iteraciones fijas</b>, centrado en entrega constante y mejora del flujo.","tema":""},
{"cat":"Kanban","q":"Características de Kanban + tablero de ejemplo con 5 estados.","a":"Kanban: <b>visualiza</b>, <b>limita el WIP</b>, <b>gestiona el flujo</b>, <b>reglas explícitas</b>, <b>mejora continua</b>. Sin iteraciones fijas.<br><br>Tablero: <b>Pendiente (WIP 8) · En curso (WIP 3) · En revisión (WIP 2) · En pruebas (WIP 2) · Hecho</b>. Avanza izq→dcha; si una columna llega al WIP se termina antes de empezar algo nuevo.","tema":""},
{"cat":"Kanban","q":"Explica la técnica de priorización MoSCoW.","a":"Cuatro categorías:<br><b>Must</b> = imprescindibles.<br><b>Should</b> = importantes, no críticos.<br><b>Could</b> = deseables si hay margen.<br><b>Won't</b> = fuera de esta entrega.<br><br>Centra el esfuerzo en lo que aporta valor y ayuda a <b>negociar el alcance</b> cuando el tiempo/recursos son limitados.","tema":""},
{"cat":"Kanban","q":"¿Cómo combinarías Scrum y Kanban? Pon un ejemplo.","a":"En <b>Scrumban</b>: se mantiene la estructura de Scrum (sprints, roles, eventos) y se añade el <b>tablero Kanban con límites de WIP</b> para controlar el flujo dentro del sprint.<br><br>Encaja con cuellos de botella o trabajo no planificado.<br>💡 Ej.: equipo de <b>soporte</b> con sprint de 2 semanas + <b>carril Kanban</b> para incidencias urgentes.","tema":""},

{"cat":"DevOps/CI-CD","q":"Similitudes y diferencias entre Ágil y DevOps (+ ejemplo).","a":"Coinciden: <b>entregas frecuentes, ciclos cortos, automatización, mejora continua</b>. Diferencia = <b>alcance</b>: ágil = cómo el equipo planifica y construye; DevOps = <b>todo el camino hasta producción</b> (une Dev + Ops).<br><br>Son <b>complementarios</b>.<br>💡 Ej.: Scrum para planificar/desarrollar + DevOps con <b>CI/CD</b> para desplegar automático.","tema":""},
{"cat":"DevOps/CI-CD","q":"¿Qué es la integración continua (CI) y qué ventajas aporta?","a":"Integrar cambios de código en un <b>repositorio común con frecuencia</b>, lanzando <b>compilación y pruebas automáticas</b>.<br><br>Ventajas: <b>detectar errores pronto</b>, reducir conflictos de integración, código siempre estable. Es la <b>base de la entrega continua</b>.","tema":""},
{"cat":"DevOps/CI-CD","q":"Diferencia entre entrega continua y despliegue continuo (CD).","a":"<b>Entrega continua</b>: cada cambio que pasa las pruebas queda <b>listo</b> para producción, pero el paso final lo <b>decide una persona</b>.<br><br><b>Despliegue continuo</b>: ese último paso <b>también se automatiza</b> → llega a producción <b>sin intervención manual</b>.<br><br>Ambos se apoyan en la <b>CI</b>.","tema":""},
{"cat":"DevOps/CI-CD","q":"¿Qué aporta la cultura DevOps a una organización?","a":"<b>Dev y Ops colaboran</b> con un objetivo común, rompiendo los silos.<br><br>Fomenta <b>automatización</b>, <b>responsabilidad compartida</b> en producción, <b>medición continua</b> y <b>aprender de los fallos</b>. Resultado: software más <b>rápido, de más calidad y más estable</b>.","tema":""},

{"cat":"Datos clave","q":"¿Cuánto dura el Daily Scrum?","a":"Máximo <b>15 minutos</b>.","tema":""},
{"cat":"Datos clave","q":"¿De cuántas personas es un equipo Scrum?","a":"De <b>3 a 9</b> personas.","tema":""},
{"cat":"Datos clave","q":"¿Cuántos roles hay en Scrum y cuáles?","a":"<b>3</b>: Product Owner, Scrum Master y Desarrolladores.","tema":""},
{"cat":"Datos clave","q":"¿Cuánto dura un Sprint?","a":"De <b>1 a 4 semanas</b> (duración fija).","tema":""},
{"cat":"Datos clave","q":"¿Qué significa INVEST?","a":"<b>I</b>ndependiente · <b>N</b>egociable · <b>V</b>aliosa · <b>E</b>stimable · <b>S</b>mall (pequeña) · <b>T</b>estable. (Calidad de una historia de usuario.)","tema":""},
{"cat":"Datos clave","q":"¿Qué significa SMART (criterios de aceptación)?","a":"<b>S</b>pecífico · <b>M</b>edible · <b>A</b>lcanzable · <b>R</b>elevante · <b>T</b>emporal. Deben ser <b>cuantificables</b> (tiempos, %, nº).","tema":""},
{"cat":"Datos clave","q":"¿Qué es el WIP?","a":"<b>Nº máximo de tareas en curso por columna</b>. Limitarlo mejora el flujo y revela cuellos de botella.","tema":""},
{"cat":"Datos clave","q":"¿Qué define el éxito de un proyecto?","a":"<b>Alcance + Tiempo + Coste</b> (triángulo).","tema":""},
{"cat":"Datos clave","q":"¿Qué mide la velocidad y qué el tiempo de ciclo?","a":"<b>Velocidad</b> = puntos completados por sprint. <b>Tiempo de ciclo</b> = de empezar a terminar una tarea.","tema":""},
{"cat":"Datos clave","q":"¿Cuántos valores y principios tiene el Manifiesto Ágil?","a":"<b>4 valores + 12 principios</b>. Se preguntan por separado.","tema":""},

{"cat":"Matices profe","q":"⚠️ ¿El Sprint es una fase del proyecto?","a":"NO. Es el <b>contenedor de los eventos</b> (planning, daily, review, retro). 'Una fase' es el distractor.","tema":""},
{"cat":"Matices profe","q":"⚠️ ¿Quién decide cuántos elementos del backlog entran al sprint?","a":"Los <b>desarrolladores</b> (hacen el planning poker y conocen su velocidad), <b>no el Product Owner</b>.","tema":""},
{"cat":"Matices profe","q":"⚠️ ¿Qué evento inspecciona el incremento y adapta el backlog con los interesados?","a":"La <b>Sprint Review</b>. El <b>refinamiento del backlog NO es un evento Scrum</b> como tal (pregunta trampa).","tema":""},
{"cat":"Matices profe","q":"⚠️ Test trampa: Kanban, ¿opción para reflejar quién hace una tarea?","a":"La correcta es la <b>A</b>, pero el examen tiene marcada y bloqueada la <b>D</b> → <b>marcar la D</b> (la máquina la da por buena).","tema":""},
{"cat":"Matices profe","q":"⚠️ Test trampa: objetivo de la reunión de refinamiento.","a":"Marcar la <b>C</b>: «resolver dudas que puedan surgir durante la iteración».","tema":""},
{"cat":"Matices profe","q":"⚠️ Tablero Kanban en el examen: ¿qué exige el profe?","a":"<b>Mínimo 5 columnas</b> (nada de 'por hacer/en curso/hecho' a secas) y poner el <b>(WIP n)</b> en cada una, con descripción del flujo.","tema":""},
{"cat":"Matices profe","q":"⚠️ ¿DevOps sustituye a Agile?","a":"No: <b>DevOps complementa a Agile</b>. Ágil = construir el producto; DevOps = llevarlo hasta producción.","tema":""},
{"cat":"Matices profe","q":"⚠️ Funciones del Scrum Master (matiz).","a":"<b>Asegura (no delega)</b> la ejecución de los eventos. 'Líder del equipo' solo en sentido organizacional, <b>nunca técnico ni único</b>.","tema":""}
];
const CATS = [...new Set(CARDS.map(c=>c.cat))];
let active = new Set(CATS), pool = [], idx = 0, onlyHard = false;
const hardSet = new Set(JSON.parse(localStorage.getItem('fc_hard_Proyectos')||'[]'));
const $ = id => document.getElementById(id);
function rebuild(){
  pool = CARDS.map((c,i)=>({...c,i})).filter(c=>active.has(c.cat)&&(!onlyHard||hardSet.has(c.i)));
  if(idx>=pool.length) idx=0;
  render();
}
function render(){
  const f=$('filters'); f.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(active.has(cat)?' on':'');
    b.textContent=cat+' ('+CARDS.filter(c=>c.cat===cat).length+')';
    b.onclick=()=>{active.has(cat)&&active.size>1?active.delete(cat):active.add(cat);rebuild();};
    f.appendChild(b);
  });
  const card=$('card'); card.classList.remove('flip');
  if(!pool.length){$('q').textContent='(no hay tarjetas en este filtro)';$('a').textContent='';$('cnt').textContent='0 / 0';return;}
  const c=pool[idx];
  setTimeout(()=>{ $('q').textContent=c.q; $('a').innerHTML=c.a; $('tagf').textContent=c.cat+(c.tema?' · Tema '+c.tema:''); $('tagb').textContent=$('tagf').textContent; },60);
  $('cnt').textContent=(idx+1)+' / '+pool.length;
  $('hard').classList.toggle('on',hardSet.has(c.i));
}
function move(d){ if(!pool.length)return; idx=(idx+d+pool.length)%pool.length; render(); }
$('card').onclick=()=>$('card').classList.toggle('flip');
$('prev').onclick=()=>move(-1); $('next').onclick=()=>move(1);
$('shuffle').onclick=()=>{for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}idx=0;render();};
$('hard').onclick=()=>{if(!pool.length)return;const c=pool[idx];hardSet.has(c.i)?hardSet.delete(c.i):hardSet.add(c.i);localStorage.setItem('fc_hard_Proyectos',JSON.stringify([...hardSet]));render();};
$('onlyhard').onclick=e=>{onlyHard=!onlyHard;e.target.classList.toggle('pri');idx=0;rebuild();};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();$('card').classList.toggle('flip');}
  if(e.key==='ArrowRight')move(1); if(e.key==='ArrowLeft')move(-1);
});
rebuild();
</script>
</body>
</html>
