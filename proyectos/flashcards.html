<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proyectos ágiles — Flashcards</title>
<style>
  :root{--bg:#fff;--fg:#1a1a1a;--mut:#555;--line:#e2e2e2;--card:#f7f7f8;--green:#1d8a4e;--red:#c0392b;--blue:#2563c9;--amber:#b9770e;}
  @media (prefers-color-scheme:dark){:root{--bg:#1e1e1e;--fg:#ededed;--mut:#b0b0b0;--line:#3a3a3a;--card:#272727;--green:#46c98b;--red:#ff7a6b;--blue:#6ea8ff;--amber:#e0a830;}}
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:-apple-system,Segoe UI,Roboto,sans-serif;line-height:1.5;max-width:760px;margin:0 auto;padding:24px 18px 60px;}
  h1{font-size:1.4rem;margin:0 0 2px;} .sub{color:var(--mut);margin:0 0 14px;font-size:.93rem;}
  .filters{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 14px;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:999px;padding:5px 12px;cursor:pointer;font:inherit;font-size:.86rem;}
  .chip.on{border-color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent);font-weight:600;}
  .stage{perspective:1200px;margin:8px 0;}
  .cardc{position:relative;width:100%;min-height:250px;cursor:pointer;transform-style:preserve-3d;transition:transform .45s;}
  .cardc.flip{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:16px;background:var(--card);padding:26px 24px;display:flex;flex-direction:column;justify-content:center;overflow:auto;}
  .face.back{transform:rotateY(180deg);border-color:var(--green);}
  .qtxt{font-size:1.08rem;font-weight:600;text-align:center;}
  .atxt{font-size:.98rem;}
  .tagl{position:absolute;top:12px;left:16px;font-size:.75rem;color:var(--mut);font-weight:600;}
  .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:.75rem;color:var(--mut);}
  .nav{display:flex;gap:8px;justify-content:center;align-items:center;margin:14px 0 4px;flex-wrap:wrap;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--fg);border-radius:10px;padding:9px 16px;cursor:pointer;font:inherit;font-weight:600;}
  .btn:hover{border-color:var(--blue);}
  .btn.pri{background:var(--blue);color:#fff;border-color:var(--blue);}
  .cnt{color:var(--mut);font-size:.9rem;min-width:90px;text-align:center;}
  .btn.hard{border-color:var(--amber);} .btn.hard.on{background:color-mix(in srgb,var(--amber) 20%,transparent);}
  kbd{border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:.8em;background:var(--card);}
</style>
</head>
<body>
<h1>Proyectos ágiles — Flashcards</h1>
<p class="sub">Recuerdo activo: lee la pregunta, responde en voz alta o mentalmente y voltea (click o <kbd>espacio</kbd>). <kbd>←</kbd>/<kbd>→</kbd> para navegar. «Difícil» crea tu pila de repaso.</p>
<div class="filters" id="filters"></div>
<div class="stage">
  <div class="cardc" id="card">
    <div class="face front"><span class="tagl" id="tagf"></span><div class="qtxt" id="q"></div><div class="hint">click / espacio para ver la respuesta</div></div>
    <div class="face back"><span class="tagl" id="tagb"></span><div class="atxt" id="a"></div></div>
  </div>
</div>
<div class="nav">
  <button class="btn" id="prev">← Anterior</button>
  <span class="cnt" id="cnt"></span>
  <button class="btn" id="next">Siguiente →</button>
</div>
<div class="nav">
  <button class="btn pri" id="shuffle">🔀 Barajar</button>
  <button class="btn hard" id="hard">⭐ Difícil</button>
  <button class="btn" id="onlyhard">Solo difíciles</button>
</div>
<script>
const CARDS = [{"cat": "Conceptos", "q": "Manifiesto Ágil: los 4 valores", "a": "1) Individuos e interacciones &gt; procesos y herramientas · 2) Software funcionando &gt; documentación exhaustiva · 3) Colaboración con el cliente &gt; negociación contractual · 4) Respuesta al cambio &gt; seguir un plan. (+ 12 principios.)", "tema": 2}, {"cat": "Conceptos", "q": "Pilares empíricos de Scrum", "a": "Transparencia, inspección y adaptación.", "tema": 3}, {"cat": "Conceptos", "q": "Valores de Scrum", "a": "Compromiso, enfoque, apertura (sinceridad), respeto y coraje.", "tema": 3}, {"cat": "Conceptos", "q": "Roles, eventos y artefactos de Scrum", "a": "Roles: Product Owner, Scrum Master, Developers. Eventos: Sprint, Sprint Planning, Daily (15 min máx), Sprint Review, Retrospectiva. Artefactos: Product Backlog, Sprint Backlog, Incremento.", "tema": 3}, {"cat": "Conceptos", "q": "Compromiso de cada artefacto Scrum", "a": "Product Backlog → Objetivo del Producto (largo plazo) · Sprint Backlog → Objetivo del Sprint · Incremento → Definición de Terminado (DoD).", "tema": 3}, {"cat": "Conceptos", "q": "Error clásico al aplicar Scrum", "a": "La NO colaboración cliente–equipo (el profe lo recalca como típico de examen).", "tema": 3}, {"cat": "Conceptos", "q": "Burndown vs Burnup", "a": "Burndown: lo que QUEDA (baja). Burnup: lo HECHO (sube) + línea de alcance — muestra además los cambios de alcance. Ambos en puntos de historia.", "tema": 9}, {"cat": "Conceptos", "q": "Lean: qué es y los 8 desperdicios", "a": "Filosofía de eliminar desperdicio y maximizar valor (síntesis de principios + pensamiento). Mudas: sobreproducción, esperas, transporte, sobreprocesado, inventario, movimientos, defectos, talento no aprovechado.", "tema": 4}, {"cat": "Conceptos", "q": "Kaizen y PDCA", "a": "Kaizen: mejora continua con pequeños cambios constantes. Ciclo PDCA: Plan → Do → Check → Act.", "tema": 4}, {"cat": "Conceptos", "q": "Las 3 prácticas núcleo de Kanban", "a": "1) Visualizar el flujo de trabajo (tablero) · 2) Limitar el WIP (trabajo en curso) · 3) Gestionar/medir el flujo. Ejemplo de tablero de 5 columnas: Backlog · Preparado · En curso · En pruebas · Terminado.", "tema": 4}, {"cat": "Conceptos", "q": "Historias de usuario: 3C e INVEST", "a": "3C: Card, Conversation, Confirmation. INVEST: Independiente, Negociable, Valiosa, Estimable, Small (pequeña), Testeable. Formato: «Como &lt;rol&gt; quiero &lt;acción&gt; para &lt;beneficio&gt;».", "tema": 5}, {"cat": "Conceptos", "q": "¿Qué es una épica?", "a": "Una historia de usuario demasiado grande (se trocea en historias más pequeñas). ✅ verificado en campus.", "tema": 5}, {"cat": "Conceptos", "q": "Técnicas de priorización", "a": "MoSCoW: Must, Should, Could, Won't. Kano: requeridos, básicos y atractivos (+ neutros e inversos). Ranking simple.", "tema": 5}, {"cat": "Conceptos", "q": "Visión de producto: herramientas", "a": "Elevator Pitch (para quién, qué, a diferencia de…), Product Box, Personas (arquetipos de usuario).", "tema": 5}, {"cat": "Conceptos", "q": "Puntos de historia y técnicas de estimación", "a": "Estimación RELATIVA de esfuerzo (Fibonacci). Técnicas: Planning Poker (consenso), T-Shirt sizes (XS-XL), Bucket System (muchos ítems rápido).", "tema": 6}, {"cat": "Conceptos", "q": "Los 5 horizontes de planificación ágil", "a": "Visión → Roadmap de producto → Plan de release → Plan de iteración/sprint → Plan del día (daily).", "tema": 6}, {"cat": "Conceptos", "q": "Velocidad y Timebox", "a": "Velocidad: puntos de historia completados por iteración (sirve para predecir). Timebox: tiempo máximo asignado a un evento/tarea que no se debe superar.", "tema": 7}, {"cat": "Conceptos", "q": "Release plan: ¿qué define?", "a": "El número de iteraciones y de entregas (releases) del proyecto ✅, guiado por la velocidad del equipo y el backlog priorizado.", "tema": 7}, {"cat": "Conceptos", "q": "Valor ganado ágil (EVM)", "a": "Mide el valor de negocio REAL entregado a los usuarios ✅ (no solo el % de trabajo hecho).", "tema": 7}, {"cat": "Conceptos", "q": "Ready vs Done", "a": "Definition of Ready: condiciones para que una historia pueda ENTRAR al sprint. Definition of Done: condiciones para considerarla TERMINADA (compromiso del Incremento).", "tema": 8}, {"cat": "Conceptos", "q": "Iteración cero, spikes y buffers", "a": "Iteración 0: preparar entorno/backlog inicial antes de desarrollar. Spike: investigación corta timeboxed para reducir incertidumbre. Buffer: margen para absorber imprevistos.", "tema": 8}, {"cat": "Conceptos", "q": "Tablero de tareas del sprint", "a": "La planificación de iteración produce un tablero de TAREAS estimadas en HORAS ✅ (las historias se descomponen en tareas).", "tema": 8}, {"cat": "Conceptos", "q": "Refinamiento del backlog", "a": "Sesiones para preparar el trabajo próximo: trocear, estimar y RESOLVER DUDAS ✅ de los elementos del Product Backlog.", "tema": 8}, {"cat": "Conceptos", "q": "Estado global del proyecto ágil", "a": "Se mide por el VALOR GENERADO ✅ (burnup/burndown respecto al alcance).", "tema": 9}, {"cat": "Conceptos", "q": "Radiadores de información", "a": "Paneles visibles y actualizados (tablero, burndown…) que comunican el estado del proyecto al equipo y stakeholders de forma pasiva.", "tema": 9}, {"cat": "Conceptos", "q": "Modelo de Tuckman", "a": "Etapas del equipo: Forming → Storming → Norming → Performing (→ Adjourning). Las Personas son «lo más importante en cualquier proyecto» (profe).", "tema": 9}, {"cat": "Conceptos", "q": "RUP: características", "a": "Dirigido por casos de uso, centrado en la arquitectura, iterativo e incremental.", "tema": 10}, {"cat": "Conceptos", "q": "Modelos SDLC clásicos", "a": "Tradicional (cascada), prototipo, iterativo, espiral (+ modelo en V, DevOps). Ágil vs tradicional: alcance variable vs fijo.", "tema": 10}, {"cat": "Conceptos", "q": "Modelo Spotify", "a": "Squads (equipos autónomos) agrupados en Tribes; Chapters (misma especialidad) y Guilds (comunidades de interés transversales).", "tema": 10}, {"cat": "Conceptos", "q": "Escalado ágil", "a": "SAFe (marco corporativo por niveles), LeSS (Scrum a lo grande, varios equipos, un backlog), Nexus (3-9 equipos Scrum integrados).", "tema": 2}, {"cat": "Banco test", "q": "¿Cuáles son los objetivos de la gestión de proyectos?", "a": "Análisis de viabilidad del proyecto, planificación del trabajo, ejecución del proyecto, seguimiento y control del trabajo, cierre del proyecto.", "tema": 1}, {"cat": "Banco test", "q": "En la gestión de proyectos en la realidad, ¿cuál de las razones siguientes no se puede asegurar?", "a": "Durante el desarrollo del proyecto los requisitos siempre serán los mismos.", "tema": 1}, {"cat": "Banco test", "q": "Una de las razones del éxito del enfoque ágil es:", "a": "El hecho de tener una comunicación transparente y más abierta entre los equipos.", "tema": 1}, {"cat": "Banco test", "q": "¿En qué tipo de proyectos se recomienda el uso de la metodología ágil?", "a": "En los que los requisitos y funcionalidades no estén del todo definidos desde el inicio y puedan tener cambios.", "tema": 1}, {"cat": "Banco test", "q": "En la relación entre el desarrollo de software ágil y DevOps:", "a": "El movimiento DevOps apuesta por ciclos de desarrollo cortos con lanzamientos confiables, alineado con los objetivos de la agilidad.", "tema": 1}, {"cat": "Banco test", "q": "¿Qué tipo de enfoque se centra en un avance iterativo e incremental?", "a": "El enfoque ágil.", "tema": 1}, {"cat": "Banco test", "q": "El número de personas trabajando en un equipo ágil:", "a": "Se manejan equipos de trabajos pequeños, normalmente no más de quince personas, dependiendo del proyecto.", "tema": 1}, {"cat": "Banco test", "q": "La principal diferencia entre el agilismo y DevOps:", "a": "Radica en los equipos de trabajo, porque en el agilismo los miembros se adaptan a cambios en el desarrollo y se apoyan, y en DevOps se unen equipo de desarrollo y operaciones.", "tema": 1}, {"cat": "Banco test", "q": "¿Cuándo se obtiene un producto viable mínimo?", "a": "Cuando se aplican metodologías ágiles, en cada iteración y en plazos cortos.", "tema": 1}, {"cat": "Banco test", "q": "En DevOps se incluyen una serie de principios o prácticas en las fases de desarrollo, ¿cuáles son algunos de estos?", "a": "Desarrollo continuo, integración continua, entrega continua, supervisión continua.", "tema": 1}, {"cat": "Banco test", "q": "El Manifiesto Ágil tiene como objetivo principal:", "a": "Establecer un conjunto de valores y principios como guía a seguir para un desarrollo de calidad, rápido y adaptado a requisitos cambiantes.", "tema": 2}, {"cat": "Banco test", "q": "¿Cuál de estos no es uno de los valores del Manifiesto Ágil?", "a": "Valorar más la negociación de un contrato con el cliente sobre la colaboración con dicho cliente o usuario final.", "tema": 2}, {"cat": "Banco test", "q": "Entre los siguientes, ¿cuál no cumple con los principios del Manifiesto Ágil?", "a": "Los procesos ágiles no pueden asegurar el desarrollo sostenible.", "tema": 2}, {"cat": "Banco test", "q": "¿Debe una empresa hacer uso de metodología tradicional y ágil al mismo tiempo?", "a": "Puede haber empresas que usen ambas metodologías, según el proyecto a desarrollar.", "tema": 2}, {"cat": "Banco test", "q": "¿Cuáles son los principios de Scrum?", "a": "La transparencia en el avance y comunicación, la inspección con revisiones a corto plazo, y la adaptación cuando surge nueva información.", "tema": 2}, {"cat": "Banco test", "q": "Lean es:", "a": "Una síntesis entre un conjunto de principios y un pensamiento para obtener productos diferentes y basados en la metodología ágil.", "tema": 2}, {"cat": "Banco test", "q": "Kanban no es:", "a": "Tanto una metodología como una herramienta que automáticamente va mostrando la evolución del proyecto definido.", "tema": 2}, {"cat": "Banco test", "q": "¿Se pueden combinar las metodologías ágiles?", "a": "Varios enfoques o metodologías ágiles se pueden usar en conjunto, por ejemplo, Lean y Scrum, junto con Kanban.", "tema": 2}, {"cat": "Banco test", "q": "Entre las ventajas de unir diferentes metodologías y enfoque ágiles, se encuentran las siguientes:", "a": "Se propone minimizar la documentación, maximizar resultados, se pueden dar cambios, y hay autogestión de personas y trabajo.", "tema": 2}, {"cat": "Banco test", "q": "¿Cuándo se aplica frameworks de escalado ágil?", "a": "Cuando en un proyecto de grandes dimensiones no se pueden resolver ciertos aspectos con los enfoques ágiles, como la predictibilidad, la comercialización, la calidad y la visibilidad.", "tema": 2}, {"cat": "Banco test", "q": "¿Cómo se origina Scrum?", "a": "Se origina como marco de trabajo ágil fundamental con aprendizaje empírico y autogestión, y se basa en el pensamiento Lean, centrándose en lo esencial.", "tema": 3}, {"cat": "Banco test", "q": "¿Qué tipo de errores se producen en algunas organizaciones al aplicar Scrum?", "a": "No se mantiene colaboración cliente y equipo de desarrollo, hay falta de liderazgo, no hay empatía, el equipo no es maduro.", "tema": 3}, {"cat": "Banco test", "q": "En LaGuía de Scrum 2020 se han realizado algunos cambios respecto a la de 2017, entre los que se incluyen estos aspectos:", "a": "Se ha hecho la guía menos prescriptiva, se habla de autogestión en vez de autoorganización, y en la planificación del Sprint se añade el por qué, además de qué y cómo.", "tema": 3}, {"cat": "Banco test", "q": "¿Cuáles son los pilares empíricos de Scrum?", "a": "Transparencia, inspección y adaptación.", "tema": 3}, {"cat": "Banco test", "q": "¿Cuáles son los valores de Scrum?", "a": "Compromiso, enfoque, sinceridad, respeto y coraje.", "tema": 3}, {"cat": "Banco test", "q": "Cuando se habla de los roles de Scrum, se considera:", "a": "Uno de los cambios fundamentales en la Guía de Scrum 2020 ha sido que se sustituye roles directamente por responsabilidades.", "tema": 3}, {"cat": "Banco test", "q": "Entre las funciones principales del Scrum Master, se encuentran la siguientes:", "a": "Impulsar la adopción de agilidad, autogestión, multifuncionalidad, ser el líder del equipo Scrum, gestionar los problemas y asegurar la ejecución de los eventos.", "tema": 3}, {"cat": "Banco test", "q": "¿Qué es un Sprint en Scrum?", "a": "El Sprint es un contenedor para los diferentes eventos del proyecto, como la planificación, Scrum diario, revisión del propio Sprint y retrospectiva de este.", "tema": 3}, {"cat": "Banco test", "q": "¿Qué son los artefactos en Scrum y cuáles son?", "a": "Son los elementos que forman la base de la productividad y calidad del proyecto. Se tienen el Product Backlog, el Sprint Backlog y el Incremento.", "tema": 3}, {"cat": "Banco test", "q": "Entre los compromisos del Product Backlog, se tiene:", "a": "Describe un estado futuro del producto como objetivo a largo plazo y que se debe cumplir antes de continuar.", "tema": 3}, {"cat": "Banco test", "q": "Lean es una filosofía que consiste en:", "a": "Que todo negocio debe maximizar el valor dado al cliente y reducir las incidencias o despilfarros.", "tema": 4}, {"cat": "Banco test", "q": "¿Cuál es la diferencia entre Lean Management y Lean Manufacturing?", "a": "Lean Management se refiere a gestión de implantar Lean y Lean Manufacturing a la aplicación de las técnicas de producción.", "tema": 4}, {"cat": "Banco test", "q": "Entre los aspectos que suponen despilfarros o desperdicios en Lean, algunos son los siguientes:", "a": "Exceso de inventario, porque se generan productos que no llegan a usarse por los clientes, y esperas porque se requiera de respuestas o acciones de otros miembros del equipo para continuar.", "tema": 4}, {"cat": "Banco test", "q": "¿Cuáles son los principios de Lean?", "a": "Valor de cliente y calidad, eliminar desperdicios, mejora continua, procesos pull, flexibilidad, y relación a largo plazo con proveedores.", "tema": 4}, {"cat": "Banco test", "q": "Imaginemos que una empresa quiere implantar Lean en su modelo de trabajo, ¿qué aspectos debería tener en cuenta?", "a": "Compromiso de la dirección, localizar el valor del cliente y la calidad, implicar a la gente al trabajo real, y pensamiento de procesos.", "tema": 4}, {"cat": "Banco test", "q": "¿Puede ser un Kanban utilizado sobre una herramienta digital?", "a": "Sí, se puede hacer tanto físico como digital.", "tema": 4}, {"cat": "Banco test", "q": "Los principios en los que se fundamenta Kanban incluyen:", "a": "Objetivos de cambios incrementales, cada miembro es líder, mejora continua y colaborativa, proceso claro, virtualizar y gestionar el flujo de trabajo.", "tema": 4}, {"cat": "Banco test", "q": "¿Qué aspectos debe considerar un tablero Kanban con un buen diseño?", "a": "Un buen diseño puede ser estructurado, con la información que sea fácil de leer, visible, entendible, que no use excesiva cantidad de colores y que se identifique bien las asignaciones a miembros. (No hay una regla única para un buen diseño, sobretodo se alcanza con la práctica, pero sí que se puede considerar evitar algunos aspectos como los indicados).", "tema": 4}, {"cat": "Banco test", "q": "¿Cuál de las siguientes opciones puede ser la mejor para reflejar quién está haciendo una tarea en Kanban?", "a": "Asignar la tarea al facilitador.", "tema": 4}, {"cat": "Banco test", "q": "En relación con el uso de kanban en un proyecto, ¿cuál de estas opciones incluye buenas prácticas?", "a": "Una tarea solo se asigna a una persona, las tareas se mueven hacia la derecha, pocas tareas en cada columna y no más de tres o cuatro personas asignadas a la vez a una tarea.", "tema": 4}, {"cat": "Banco test", "q": "Cuando hablamos de gestión ágil de proyectos, hay que plantear una visión que considera una serie de aspectos, entre los que se encuentran:", "a": "Se habla de una visión unificada del proyecto, en la que se analiza y comprende el por qué se lleva a cabo cada tarea, priorizando los requisitos, y por qué se aporta valor de negocio.", "tema": 5}, {"cat": "Banco test", "q": "¿A qué nos referimos con el Product Box?", "a": "Es una técnica que se usar para transmitir la visión unificada del proyecto.", "tema": 5}, {"cat": "Banco test", "q": "Las historias de usuario se usan:", "a": "En marcos de metodologías ágiles como Scrum y Kanban.", "tema": 5}, {"cat": "Banco test", "q": "¿Qué son las Personas cuando trabajamos en la gestión de proyectos?", "a": "Es un grupo de usuarios del producto final, también considerados como un arquetipo.", "tema": 5}, {"cat": "Banco test", "q": "Sobre los criterios de aceptación de un requisito:", "a": "Deben tener una respuesta directa y clara sobre si están bien cubiertos o no.", "tema": 5}, {"cat": "Banco test", "q": "¿Cuáles son los niveles de priorización del modelo Kano?", "a": "Elementos requeridos, básicos, atractivos, además de poder considerar neutros e inversos.", "tema": 5}, {"cat": "Banco test", "q": "Cuando se trabaja en las historias de usuario, pueden surgir las épicas, ¿qué son exactamente?", "a": "Son historias de usuario demasiado grandes.", "tema": 5}, {"cat": "Banco test", "q": "A la hora de priorizar las historias de usuarios, se pueden emplear una serie de técnicas, tales como:", "a": "La técnica de MoSCow, Kano y priorización por ranking.", "tema": 5}, {"cat": "Banco test", "q": "En caso de que aparezca un nuevo requisito que sea más prioritario que los ya registrados en el Backlog durante el transcurso del proyecto, ¿cómo debe considerarse?", "a": "Hay que incluirlo en el Backlog como los responsables de negocio puedan determinar, en base a la prioridad y las dependencias técnicas.", "tema": 5}, {"cat": "Banco test", "q": "Cuando ya se pone en marcha el Product Backlog, se debe realizar una revisión periódica, en la que:", "a": "Se adapta el Backlog mediante un refinamiento adecuado para el proyecto, agrupando elementos a corto y largo plazo.", "tema": 5}, {"cat": "Banco test", "q": "La estimación y la planificación ágil:", "a": "La estimación permite asignar puntos de historia como medidas de esfuerzo relativo, y la planificación plantea iteraciones basadas en los objetivos, de manera iterativa e incremental.", "tema": 6}, {"cat": "Banco test", "q": "En un punto de historia, el número de horas asignadas:", "a": "Puede ser distinto en cada proyecto.", "tema": 6}, {"cat": "Banco test", "q": "¿Quién es el responsable de llevar a cabo la estimación ágil de requisitos?", "a": "El Product Owner junto con el líder ágil y el equipo, refinando el Product Backlog.", "tema": 6}, {"cat": "Banco test", "q": "La técnica Planning Poker sirve para:", "a": "Realizar una estimación ágil haciendo uso de puntos de historia, estimando la dificultad de la tarea.", "tema": 6}, {"cat": "Banco test", "q": "¿En qué consiste el método The Bucket System?", "a": "En colocar valores diferentes de los puntos de historia en una tabla, metiendo cada historia de usuario en un cubo, en base a la estimación.", "tema": 6}, {"cat": "Banco test", "q": "Entre los beneficios de la estimación ágil, podemos encontrar:", "a": "Adaptabilidad, innovación, bajo coste, calidad y time-to-market.", "tema": 6}, {"cat": "Banco test", "q": "¿Cuál es la principal diferencia entre la planificación ágil y la tradicional?", "a": "La planificación ágil es iterativa, progresiva, y se adapta a cambios, y la tradicional es predictiva y se basa en identificar tareas a priori.", "tema": 6}, {"cat": "Banco test", "q": "Los horizontes de planificación ágil son:", "a": "Una serie de niveles que llevan a cabo acciones para ir avanzando en los planes de producto, hoja de rutas, entregas e iteraciones.", "tema": 6}, {"cat": "Banco test", "q": "La creación de una hoja de ruta o Roadmap, se puede dividir en estos pasos:", "a": "Asegurar la estrategia y tecnología, identificar los requisitos desde el Product Backlog, organizar los temas y entregas y determinar líneas de tiempo a alto nivel.", "tema": 6}, {"cat": "Banco test", "q": "¿Cuándo se realiza la planificación de las entregas o Release Plan?", "a": "Cuando se deben hacer las entregas de los incrementos del producto.", "tema": 6}, {"cat": "Banco test", "q": "¿Qué información viene reflejada en el Roadmap de producto?", "a": "Se determina el número de iteraciones del proyecto y de las entregas.", "tema": 7}, {"cat": "Banco test", "q": "La mejor forma para representar un Roadmap es:", "a": "Mediante un mapa visual claro.", "tema": 7}, {"cat": "Banco test", "q": "¿Por qué es necesario que un proyecto ágil mantenga las iteraciones con la misma duración durante la vida del proyecto?", "a": "Porque así se puede medir y comparar la velocidad entre las diferentes iteraciones.", "tema": 7}, {"cat": "Banco test", "q": "¿Cuántas iteraciones tiene un proyecto ágil respecto a uno tradicional?", "a": "Es algo que depende del proyecto, y se identifica en el Roadmap.", "tema": 7}, {"cat": "Banco test", "q": "¿Cuál es la principal diferencia entre el Roadmap y el Release Plan?", "a": "Que el Roadmap comunica una descripción de la estrategia de producto, y el Release Plan describe el proceso de ejecución por iteraciones.", "tema": 7}, {"cat": "Banco test", "q": "La planificación de entregas se representa mediante:", "a": "Un mapa de historias que indican las que se llevan a cabo por iteración.", "tema": 7}, {"cat": "Banco test", "q": "¿En qué consiste la técnica del Timebox en la planificación ágil?", "a": "Consiste en fijar el tiempo máximo que debe no debe superarse para conseguir un objetivo, o realizar una tarea, en una iteración.", "tema": 7}, {"cat": "Banco test", "q": "En la gestión ágil del cambio, la velocidad ágil se refiere a:", "a": "La cantidad de puntos de historia que el equipo de trabajo puede ser capaz de cumplir en cada iteración.", "tema": 7}, {"cat": "Banco test", "q": "En el enfoque ágil, se buscan tiempos de ciclo:", "a": "Cortos.", "tema": 7}, {"cat": "Banco test", "q": "El valor ganado del proyecto es:", "a": "La estrategia usada para conocer el valor de negocio real que genera un proyecto a los usuarios.", "tema": 7}, {"cat": "Banco test", "q": "¿Cuándo termina el desarrollo de un proyecto, Definition of Done?", "a": "Cuando el contenido planificado se ha completado satisfactoriamente, sin necesidad de que se cumpla la fecha de entrega.", "tema": 8}, {"cat": "Banco test", "q": "La definición de listo, Ready:", "a": "Marca el momento de salida tanto para un requisito, iteración o proyecto.", "tema": 8}, {"cat": "Banco test", "q": "Cuando se va a comenzar una iteración:", "a": "Se determinan los requisitos que se implementarán en dicha iteración.", "tema": 8}, {"cat": "Banco test", "q": "¿Cuál es el resultado de llevar a cabo el proceso de planificación de una iteración?", "a": "Se establece un panel o tablero de tareas que resuelve todos los requisitos de una iteración, cada una con las horas estimadas.", "tema": 8}, {"cat": "Banco test", "q": "Una buena práctica para indicar el contenido de una iteración:", "a": "Es crear tantas tareas para cada requisito como condiciones tenga la definición de hecho o Done.", "tema": 8}, {"cat": "Banco test", "q": "¿Cómo se calcula el avance de un proyecto ágil?", "a": "Según el número de puntos completados.", "tema": 8}, {"cat": "Banco test", "q": "En un proyecto ágil, ¿qué variable de entrada es fundamental para planificar: el número de personas o la fecha máxima?", "a": "Ambas.", "tema": 8}, {"cat": "Banco test", "q": "¿Cuánto dura la reunión diaria o Daily stand-up?", "a": "Quince minutos como máximo.", "tema": 8}, {"cat": "Banco test", "q": "Entre los beneficios de la reunión de retrospectiva, se encuentran:", "a": "Reflexionar sobre el proceso, encontrar formas de mejorar la productividad y actualizar la definición de hecho.", "tema": 8}, {"cat": "Banco test", "q": "¿Cuál es el objetivo de la reunión de refinamiento?", "a": "Resolver dudas que puedan surgir durante la iteración.", "tema": 8}, {"cat": "Banco test", "q": "La técnica de valor ganado en los proyectos ágiles es:", "a": "La estrategia que se usa para conocer el valor de negocio del proyecto y es del 100 % real en proyectos ágiles.", "tema": 9}, {"cat": "Banco test", "q": "Cuando se habla del estado global del proyecto ágil:", "a": "Se valora el estado desde el punto de vista del valor generado.", "tema": 9}, {"cat": "Banco test", "q": "¿Qué suele representar el burndown de una Release?", "a": "El número de puntos de historia que quedan por realizar, según las previstas en la Release.", "tema": 9}, {"cat": "Banco test", "q": "Un gráfico de burnup de una reléase representa:", "a": "El número de puntos de historia que se han realizado ya, según las previstas en la release.", "tema": 9}, {"cat": "Banco test", "q": "¿Cómo se deben disponer las tarjetas en un radiador de información?", "a": "De forma ordenada y limpia.", "tema": 9}, {"cat": "Banco test", "q": "Los atributos de autoorganización y autodirección de los equipos ágiles:", "a": "Son objetivos del enfoque ágil a largo plazo.", "tema": 9}, {"cat": "Banco test", "q": "Comúnmente, un equipo ágil autoorganizado:", "a": "Arranca como equipo inmaduro e irá mejorando.", "tema": 9}, {"cat": "Banco test", "q": "El estilo de liderazgo de proyecto para el empoderamiento de un equipo ágil es:", "a": "Facilitador.", "tema": 9}, {"cat": "Banco test", "q": "¿Cómo puede ser definida la motivación de un equipo ágil?", "a": "Como un vector de fuerzas que impulsan al equipo.", "tema": 9}, {"cat": "Banco test", "q": "¿En qué momento se deben registrar las lecciones aprendidas?", "a": "Durante la ejecución del proyecto.", "tema": 9}, {"cat": "Banco test", "q": "¿Cuál de las siguientes es una posible desventaja del enfoque ágil?", "a": "Suele implicar el no tener tan claro qué se debe hacer a largo plazo.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuál es la actitud más adecuada respecto a los cambios en los proyectos?", "a": "Se debe entender que son necesarios y beneficiosos.", "tema": 10}, {"cat": "Banco test", "q": "El enfoque tradicional pierde importancia respecto al ágil, debido a:", "a": "Que el enfoque tradicional es menos adaptable.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuál es la característica principal del enfoque ágil respecto al tradicional?", "a": "El enfoque ágil implica menos planificación detallada al inicio.", "tema": 10}, {"cat": "Banco test", "q": "La planificación de un proyecto debe ser:", "a": "Lo más realista posible.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuál es la evolución del riesgo en un proyecto ágil respecto al tradicional?", "a": "En el enfoque ágil se reduce el riesgo con mayor medida que el tradicional.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuál de las siguientes alternativas es más importante como centro fundamental en la gestión de proyectos con enfoque ágil?", "a": "El valor del resultado desde el punto de vista de negocio.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuáles de estos son modelos o métodos SDLC (Software Development Life Cycle)?", "a": "Tradicional, prototipo, iterativo y espiral.", "tema": 10}, {"cat": "Banco test", "q": "El objetivo de DevOps es:", "a": "Reducir el ciclo de vida del desarrollo de sistemas y proporcionar una entrega continua, siendo complementario a lo que se hace en la metodología ágil.", "tema": 10}, {"cat": "Banco test", "q": "¿Cuáles son las características básicas de RUP (Rational Unified Process)?", "a": "El estar dirigido por casos de uso, centrado en la arquitectura y ser iterativo e incremental.", "tema": 10}];
const CATS = [...new Set(CARDS.map(c=>c.cat))];
let active = new Set(CATS), pool = [], idx = 0, onlyHard = false;
const hardSet = new Set(JSON.parse(localStorage.getItem('fc_hard_Proyectos')||'[]'));
const $ = id => document.getElementById(id);
function rebuild(){
  pool = CARDS.map((c,i)=>({...c,i})).filter(c=>active.has(c.cat)&&(!onlyHard||hardSet.has(c.i)));
  if(idx>=pool.length) idx=0;
  render();
}
function render(){
  const f=$('filters'); f.innerHTML='';
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='chip'+(active.has(cat)?' on':'');
    b.textContent=cat+' ('+CARDS.filter(c=>c.cat===cat).length+')';
    b.onclick=()=>{active.has(cat)&&active.size>1?active.delete(cat):active.add(cat);rebuild();};
    f.appendChild(b);
  });
  const card=$('card'); card.classList.remove('flip');
  if(!pool.length){$('q').textContent='(no hay tarjetas en este filtro)';$('a').textContent='';$('cnt').textContent='0 / 0';return;}
  const c=pool[idx];
  setTimeout(()=>{ $('q').textContent=c.q; $('a').innerHTML=c.a; $('tagf').textContent=c.cat+(c.tema?' · Tema '+c.tema:''); $('tagb').textContent=$('tagf').textContent; },60);
  $('cnt').textContent=(idx+1)+' / '+pool.length;
  $('hard').classList.toggle('on',hardSet.has(c.i));
}
function move(d){ if(!pool.length)return; idx=(idx+d+pool.length)%pool.length; render(); }
$('card').onclick=()=>$('card').classList.toggle('flip');
$('prev').onclick=()=>move(-1); $('next').onclick=()=>move(1);
$('shuffle').onclick=()=>{for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}idx=0;render();};
$('hard').onclick=()=>{if(!pool.length)return;const c=pool[idx];hardSet.has(c.i)?hardSet.delete(c.i):hardSet.add(c.i);localStorage.setItem('fc_hard_Proyectos',JSON.stringify([...hardSet]));render();};
$('onlyhard').onclick=e=>{onlyHard=!onlyHard;e.target.classList.toggle('pri');idx=0;rebuild();};
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();$('card').classList.toggle('flip');}
  if(e.key==='ArrowRight')move(1); if(e.key==='ArrowLeft')move(-1);
});
rebuild();
</script>
